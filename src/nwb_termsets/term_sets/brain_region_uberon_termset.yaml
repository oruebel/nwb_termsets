      hemisphere part of cerebellar anterior lobe:
        description: A multi-tissue structure that is part of a anterior lobe of cerebellum and is part of a cerebellar hemisphere.
        meaning: UBERON:0014647
      hemisphere part of cerebellar posterior lobe:
        description: A multi-tissue structure that is part of a cerebellar hemisphere and is part of a posterior lobe of cerebellum.
        meaning: UBERON:0014648
      hemispheric lobule VIII:
        description: The biventer lobule (or biventral lobule) is triangular in shape; its apex points backward, and is joined by the gray band to the pyramid. The lateral border is separated from the inferior semilunar lobule by the postpyramidal fissure. The base is directed forward, and is on a line with the anterior border of the tonsil, and is separated from the flocculus by the postnodular fissure.
        meaning: UBERON:0006121
      hindbrain:
        description: 'The most posterior of the three principal regions of the brain. In mammals and birds the hindbrain is divided into a rostral metencephalon and a caudal myelencephalon. In zebrafish, with the exception of the cerebellum, the ventral remainder of the metencephalon can be separated only arbitrarily from the more caudal myelencephalic portion of the medulla oblongata (From: Neuroanatomy of the Zebrafish Brain)[ZFA]. Organ component of neuraxis that has as its parts the pons, cerebellum and medulla oblongata[FMA].'
        meaning: UBERON:0002028
      hippocampal field:
        description: A part or parts of the hippocampus that have a particular function.
        meaning: UBERON:0003876
      hippocampal formation:
        description: Hippocampus (proper) plus dentate gyrus and subiculum[definition derived from NIF comments and ontology alignment].
        meaning: UBERON:0002421
      hippocampal formation of GP94:
        description: "The combined region of Ammon\xD5s horn, subicular complex and dentate gyrus; only fields CA1-CA3 of the hippocampus were considered to be part of the HF, field CA4 being included in the hilus of the dentate gyrus[1]."
        meaning: UBERON:0023862
      horizontal limb of the diagonal band:
        description: 'UBERON region ''horizontal limb of the diagonal band'' (UBERON:0006123). Synonyms: crus horizontale striae diagonalis, diagonal band horizontal limb, hDBB.'
        meaning: UBERON:0006123
      hyperpallium:
        description: A pallial structure unique to avians.
        meaning: UBERON:0007347
      hyperpallium apicale:
        description: Missing definition for term UBERON:0014757. Please replace it using linked reference.
        meaning: UBERON:0014757
      hypothalamus:
        description: A specialized brain region of the ventral diencephalon arising near the end of the segmentation period; the embryonic hypothalamic region will give rise to the posterior pituitary gland as well as a number of brain nuclei. [ZFA]. One of the most important functions of the hypothalamus is to link the nervous system to the endocrine system via the pituitary gland (hypophysis).[Wikipedia].
        meaning: UBERON:0001898
      inferior colliculus:
        description: Part of the midbrain tectum, consisting of paired predominantly gray matter elevations on the dorsal aspect of the midbrain, located caudal to the superior colliculus, dorsal to the periaqueductal gray of the cerebral aqueduct and rostral to the cerebellum. According to Neuronames, the inferior colliculus comprises the central, pericentral and external nucleus and two predominantly white matter structures, the brachium of the inferior colliculus and the commissure of the inferior colliculus (MM).
        meaning: UBERON:0001946
      inferior esophageal nerve (sensu Cancer borealis):
        description: The inferior esophageal nerve (ION) is one of the four nerves that make up the stomatogastric nerve (SGN).
        meaning: UBERON:8910017
      inferior lateral occipital cortex:
        description: 'UBERON region ''inferior lateral occipital cortex'' (UBERON:0022367). Synonyms: lateral occipital cortex, inferior division (OLI), lateral occipital cortex, inferior division.'
        meaning: UBERON:0022367
      inferior lobe:
        description: 'UBERON region ''inferior lobe'' (UBERON:2000165). Synonyms: inferior lobes.'
        meaning: UBERON:2000165
      inferior rostral gyrus:
        description: UBERON region 'inferior rostral gyrus' (UBERON:0019278).
        meaning: UBERON:0019278
      inferior transverse frontopolar gyrus:
        description: 'UBERON region ''inferior transverse frontopolar gyrus'' (UBERON:0024183). Synonyms: inferior transverse frontopolar gyrus.'
        meaning: UBERON:0024183
      infralimbic area:
        description: A region in the medial prefrontal cortex that is ventral to the prelimbic area important in supression of conditioned reward and fear behaviour.
        meaning: UBERON:8440033
      interanterodorsal nucleus of the thalamus:
        description: A group of nerve cells that bridges the midline of the thalamus between the anterodorsal nucleus of the thalamus of the left and right sides. According to Crosby (1962), it is more developed and consistently present in rodents than in primates (adapted from Brain Info).
        meaning: UBERON:0035972
      intergeniculate leaflet of the lateral geniculate complex:
        description: 'UBERON region ''intergeniculate leaflet of the lateral geniculate complex'' (UBERON:0035975). Synonyms: IGL, intergeniculate leaflet of the lateral geniculate complex, intergeniculate leaflet, lateral geniculate complex.'
        meaning: UBERON:0035975
      intermediate hypothalamic region:
        description: )
        meaning: UBERON:0002555
      intermediate part of hypophysis:
        description: 'UBERON region ''intermediate part of hypophysis'' (UBERON:0023752). Synonyms: intermediate lobe of hypophysis, intermediate part of hypophysis, intermediate region of hypophysis.'
        meaning: UBERON:0023752
      interstitial part of hyperpallium apicale:
        description: Missing definition for term UBERON:0014758. Please replace it using linked reference.
        meaning: UBERON:0014758
      isla magna of Calleja:
        description: Regional part of telencephalon; the most prominent of the islands of Calleja located medially in the nucleus accumbens (adapted from Braininfo.org).
        meaning: UBERON:0023868
      islands of Calleja of olfactory tubercle:
        description: Part of olfactory tubercle defined by dense aggregations of granule cells.
        meaning: UBERON:0023867
      isthmus of cingulate cortex:
        description: 'UBERON region ''isthmus of cingulate cortex'' (UBERON:0027061). Synonyms: isthmus of cingulate cortex.'
        meaning: UBERON:0027061
      junction of superior esophageal nerve and stomatogastric nerve (sensu Cancer borealis):
        description: The junction between the stomatogastric nerve (STN) and the superior esophageal nerve (SON) shows synaptic structures. Octopamine may be released at this site by projection neurons; its application at this junction induces action potentials in the axons of the modulatory commissural neuron 5 (MCN5) that project from the commissural ganglia to the stomatogastric ganglion (STG).
        meaning: UBERON:8910022
      koniocortex:
        description: Regions of the cerebal cortex characterized by a particularly well-developed inner granular layer (layer 4); this type of cerebral cortex is represented by the primary sensory Brodmann area 17 of the visual cortex, Brodmann areas 1-3 of the somatic sensory cortex, and Brodmann area 41 of the auditory cortex.
        meaning: UBERON:0013589
      lateral amygdaloid nucleus, dorsolateral part:
        description: 'UBERON region ''lateral amygdaloid nucleus, dorsolateral part'' (UBERON:0023415). Synonyms: lateral amygdaloid nucleus, dorsolateral part.'
        meaning: UBERON:0023415
      lateral amygdaloid nucleus, ventrolateral part:
        description: 'UBERON region ''lateral amygdaloid nucleus, ventrolateral part'' (UBERON:0023416). Synonyms: lateral amygdaloid nucleus, ventrolateral part.'
        meaning: UBERON:0023416
      lateral amygdaloid nucleus, ventromedial part:
        description: 'UBERON region ''lateral amygdaloid nucleus, ventromedial part'' (UBERON:0023417). Synonyms: lateral amygdaloid nucleus, ventromedial part.'
        meaning: UBERON:0023417
      lateral division:
        description: UBERON region 'lateral division' (UBERON:2000532).
        meaning: UBERON:2000532
      lateral gastric nerve (sensu Cancer borealis):
        description: Consists of lateral gastric (LG) neurons. The alternation between the lateral gastric neurons/medial gastric neurons and the lateral posterior gastric neurons control the movements of the lateral teeth in crustaceans.
        meaning: UBERON:8910013
      lateral granular eminence:
        description: UBERON region 'lateral granular eminence' (UBERON:2000187).
        meaning: UBERON:2000187
      lateral hypothalamic area:
        description: The lateral hypothalamus or lateral hypothalamic area is a part of the hypothalamus. It is concerned with hunger. Damage to this area can cause reduced food intake. Stimulating the lateral hypothalamus causes a desire to eat, while stimulating the ventromedial hypothalamus causes a desire to stop eating. [WP,unvetted].
        meaning: UBERON:0002430
      lateral orbital frontal cortex:
        description: Component of the orbtial frontal cortex The rostral boundary is the first slice where the lateral orbital gyrus is apparent with the frontomarginal sulcus whereas the caudal boundary is the disappearance of the lateral orbital gyrus. The medial and lateral boundaries are the midpoint of the olfactory sulcus and the lateral bank of the lateral orbital sulcus and/or the circular insular sulcus respectively (Christine Fennema-Notestine).
        meaning: UBERON:0022716
      lateral pallium:
        description: Subdivision of pallium that is located laterally.
        meaning: UBERON:0014741
      lateral ventricular nerve (sensu Cancer borealis):
        description: The motor axons that project into the dorsal ventricular nerve bifurcate and then project into both lateral ventricular nerves.
        meaning: UBERON:8910014
      lateral visual area:
        description: 'UBERON region ''lateral visual area'' (UBERON:0035895). Synonyms: VISl.'
        meaning: UBERON:0035895
      lateral visual area, layer 4:
        description: 'UBERON region ''lateral visual area, layer 4'' (UBERON:0035915). Synonyms: VISl4.'
        meaning: UBERON:0035915
      lateral visual area, layer 5:
        description: 'UBERON region ''lateral visual area, layer 5'' (UBERON:0035916). Synonyms: VISl5.'
        meaning: UBERON:0035916
      lateral visual area, layer 6a:
        description: 'UBERON region ''lateral visual area, layer 6a'' (UBERON:0035918). Synonyms: VISl6a.'
        meaning: UBERON:0035918
      left auditory cortex:
        description: An auditory cortex that is in the right side of a brain.
        meaning: UBERON:0009898
      left dorsal thalamus:
        description: A dorsal thalamus that is in_the_left_side_of a diencephalon.
        meaning: UBERON:0013683
      left hemisphere of cerebellum:
        description: A cerebellar hemisphere that is in_the_left_side_of a cerebellum.
        meaning: UBERON:0014889
      lobule simplex:
        description: 'UBERON region ''lobule simplex'' (UBERON:0005350). Synonyms: hemispheric lobule VI, lobule VI of hemisphere of cerebellum, lobule h VI of larsell.'
        meaning: UBERON:0005350
      locus ceruleus:
        description: The locus ceruleus is a dense cluster of neurons within the dorsorostral pons. This nucleus is the major location of neurons that release norepinephrine throughout the brain, and is responsible for physiological responses to stress and panic[GO]. Bluish region in the superior angle of the fourth ventricle floor, corresponding to melanin-like pigmented nerve cells which lie lateral to the ponto-mesencephalic central gray (griseum centrale). It is also known as nucleus pigmentosus pontis[GAID].
        meaning: UBERON:0002148
      lower rhombic lip:
        description: Posterior portion of the rhombic lip contained within rhombomeres 2-8. Gives rise to several brainstem nuclei and choroid plexus.
        meaning: UBERON:0009840
      main olfactory bulb:
        description: 'The main olfactory bulb has a multi-layered cellular architecture. In order from surface to the center the layers are: Glomerular layer, External plexiform layer, Mitral cell layer, Internal plexiform layer, Granule cell layer[WP].'
        meaning: UBERON:0009951
      matrix compartment:
        description: The larger of two chemoarchitectural compartments identified in the neostriatum through differential staining for various biochemical markers. It usually is identified through differentially high staining for acetylcholinesterase and calbinin D28K.
        meaning: UBERON:0027368
      matrix compartment of caudate nucleus:
        description: Matrix compartment located in the caudate nucleus.
        meaning: UBERON:0029001
      matrix compartment of putamen:
        description: 'UBERON region ''matrix compartment of putamen'' (UBERON:0029002). Synonyms: matrix compartment of putamen.'
        meaning: UBERON:0029002
      matrix part of head of caudate nucleus:
        description: Matrix compartment located in the head of the caudate nucleus.
        meaning: UBERON:0027245
      matrix part of tail of caudate nucleus:
        description: Matrix compartment located in the tail of the caudate nucleus.
        meaning: UBERON:0027246
      medial accessory olive:
        description: Regional part of the inferior olivary complex.
        meaning: UBERON:0014287
      medial caudal lobe:
        description: UBERON region 'medial caudal lobe' (UBERON:2000388).
        meaning: UBERON:2000388
      medial division:
        description: UBERON region 'medial division' (UBERON:2000280).
        meaning: UBERON:2000280
      medial orbital frontal cortex:
        description: Component of the orbtial frontal cortex. The rostral boundary is the first slice where the medial orbital gyrus became visible whereas the caudal boundary is the disappearance of the medial orbital gyrus/gyrus rectus. The medial and lateral boundaries are the cingulate cortex on the u2018inflatedu2019 surface and the medial bank of the superior frontal gyrus (or the cingulate gyrus when visible) respectively (Christine Fennema-Notestine).
        meaning: UBERON:0022352
      medial pallium:
        description: Subdivision of pallium that is located is the medial position in vertebrates with an evaginated brain and in the distal position in vertebrates with an everted brain.
        meaning: UBERON:0014738
      medial prefrontal cortex:
        description: 'The medial prefrontal cortex (mPFC) is a subdivision of the prefrontal cortex composed of BA12, BA25, and anterior cingulate cortex: BA32, BA33, BA24. Within this region is the dorsal nexus, which interconnects multiple brain networks and plays a role in maintenance and manipulation of information (working memory), as well as supporting the control of cognitive functions such as emotion processing and regulation, memory, decision making, and conflict resolution.'
        meaning: UBERON:4450000
      medial preoptic region:
        description: 'UBERON region ''medial preoptic region'' (UBERON:0007769). Synonyms: medial preoptic area, medial preopticarea.'
        meaning: UBERON:0007769
      medial transverse frontopolar gyrus:
        description: 'UBERON region ''medial transverse frontopolar gyrus'' (UBERON:0024193). Synonyms: medial transverse frontopolar gyrus.'
        meaning: UBERON:0024193
      medial ventral tegmental area:
        description: 'UBERON region ''medial ventral tegmental area'' (UBERON:0023865). Synonyms: medial ventral tegmental area.'
        meaning: UBERON:0023865
      median eminence of neurohypophysis:
        description: Elevation on the ventral surface of the brain located at the zone of attachment between the hypothalamic floor and the hypophysis (Butler and Hodos, Comparative Vertebrate Neuroanatomy, 2nd ed., 2005, pg. 446).
        meaning: UBERON:0002197
      median tuberal portion:
        description: Multi-tissue structure which is part of the hypothalamus and consists of caudal and ventral zones, and is separated from the dorsal hypothalamic zone by a deep ventral sulcus. From Neuroanatomy of the Zebrafish Brain.
        meaning: UBERON:2000392
      median ventricular nerve (sensu Cancer borealis):
        description: Most of the efferent fibers leaving the stomatogastric ganglion and leading to the gastric mill or pyloric stomach muscles run posteriorly in the dorsal median ventricular nerve. This nerve branches bilaterally into the right and left lateral ventricular nerves (LVN) which go to their respective sides of the stomach.
        meaning: UBERON:8910023
      medullary command nucleus:
        description: 'Definition reference: Moortgat, KT, Bullock, TH, and Sejnowski TJ. 2000. J Neurophysiol 83: 971-983. Precision of the Pacemaker Nucleus in a Weakly Electric Fish: Network Versus Cellular Influences.'
        meaning: UBERON:2002107
      mesopallium:
        description: 'UBERON region ''mesopallium'' (UBERON:0007349). Synonyms: middle pallium.'
        meaning: UBERON:0007349
      midbrain:
        description: The midbrain is the middle division of the three primary divisions of the developing chordate brain or the corresponding part of the adult brain (in vertebrates, includes a ventral part containing the cerebral peduncles and a dorsal tectum containing the corpora quadrigemina and that surrounds the aqueduct of Sylvius connecting the third and fourth ventricles)[GO].
        meaning: UBERON:0001891
      midbrain raphe nuclei:
        description: Midline nuclei found in the midbrain, includes the dorsal raphe nucleus and the rostral linear nucleus of raphe.
        meaning: UBERON:0007412
      midbrain tectum:
        description: Dorsal part of the midbrain, consisting of the superior and inferior colliculi and the pretectal nuclei (MM).
        meaning: UBERON:0002314
      midbrain tegmentum:
        description: '''tegmentum'' is used generically for the ventral part of the brainstem (ISBN:0471888893). We use the label ''midbrain tegmentum'' to denote the midbrain structure. In NIFSTD tegmentum is a composite structure and there is a separate class for midbrain tegmentum and pontine tegmentum'
        meaning: UBERON:0001943
      neocortex:
        description: 'An area of cerebral cortex defined on the basis of cytoarchitecture that have six layers. Starting from the cortical surface the layers are: molecular layer (I), external granular layer (II), external pyramidal layer (III), internal granular layer (IV), internal pyramidal layer (V), and multiform layer (VI). Neocortex is most prominent in the frontal lobe, the parietal lobe, the temporal lobe and the occipital lobe, less so in the cingulate gyrus, the parahippocampal gyrus and the insula. It is composed of two subdivisions: true isocortex and proisocortex (Carpenter-83)(NN).'
        meaning: UBERON:0001950
      neural lobe of neurohypophysis:
        description: The posterior pituitary (or neurohypophysis) comprises the posterior lobe of the pituitary gland and is part of the endocrine system. Despite its name, the posterior pituitary gland is not a gland, per se; rather, it is largely a collection of axonal projections from the hypothalamus that terminate behind the anterior pituitary gland. [WP,unvetted].
        meaning: UBERON:0003217
      neurohypophysis:
        description: The posterior part of the pituitary gland that secretes hormones involved in blood pressure regulation such as oxytocin and antidiuretic hormon.
        meaning: UBERON:0002198
      nidopallium:
        description: The nidopallium, meaning nested pallium, is the region of the avian brain that is used mostly for some types of executive functions but also other higher cognitive tasks.
        meaning: UBERON:0007334
      noradrenergic cell group A1:
        description: A group of cells in the vicinity of the lateral reticular nucleus of the medullary reticular formation that label for norepinephrine in primates.
        meaning: UBERON:8440016
      noradrenergic cell group A4:
        description: A group of cells exhibiting noradrenergic fluorescence that, in the rat, are located in the Tegmen ventriculi quarti (roof of the fourth ventricle) ventral to the cerebellar nuclei, and in the macaque, are found at the edge of the lateral recess of the fourth ventricle caudally, extending to beneath the floor of the ventricle where they merge with the noradrenergic group A6, the locus ceruleus.
        meaning: UBERON:8440018
      noradrenergic cell group A5:
        description: A group of cells in the vicinity of the superior olivary complex in the pontine tegmentum that label for norepinephine in primates, rodents, and other mammals.
        meaning: UBERON:8440019
      noradrenergic cell group A6sc:
        description: A group of cells fluorescent for norepinephrine that are scattered in the nucleus subceruleus of the macaque.
        meaning: UBERON:8440022
      noradrenergic cell group A7:
        description: A group of cells fluorescent for norepinephrine that is located in the pontine reticular formation ventral to the superior cerebellar peduncle of the pons in rodents and in primates.
        meaning: UBERON:8440021
      noradrenergic cell group Acg:
        description: A group of cells fluorescent for norepinephrine that are located in the central gray of the midbrain at the level of the trochlear nucleus in the squirrel monkey (Saimiri) and to a lesser degree in the macaque.
        meaning: UBERON:8440023
      noradrenergic cell groups:
        description: Collections of neurons in the central nervous system that have been demonstrated by histochemical fluorescence to contain the neurotransmitter norepinephrine (noradrenalin).
        meaning: UBERON:8440015
      noradrenergiccell group A2:
        description: A group of cells in the vicinity of the dorsal motor nucleus of the vagus nerve in the medulla that label for norepinephrine in primates and rodents.
        meaning: UBERON:8440017
      nucleus of the brachium of the inferior colliculus:
        description: 'UBERON region ''nucleus of the brachium of the inferior colliculus'' (UBERON:0036012). Synonyms: BrC, NB, brachial nucleus of the inferior colliculus.'
        meaning: UBERON:0036012
      occipital fusiform gyrus:
        description: 'UBERON region ''occipital fusiform gyrus'' (UBERON:0022364). Synonyms: FuGo, occipital fusiform gyrus (OF), occipitotemporal (fusiform) gyrus, occipital part.'
        meaning: UBERON:0022364
      occipital pole:
        description: The anterior end of the hemisphere is named the frontal pole. The posterior end is named the occipital pole. The anterior end of the temporal lobe, the temporal pole. [WP,unvetted].
        meaning: UBERON:0002902
      olfactory bulb:
        description: A bulbous anterior projection of the olfactory lobe that is the place of termination of the olfactory nerves and is especially well developed in lower vertebrates (as fishes)[BTO].
        meaning: UBERON:0002264
      olfactory cortex:
        description: Aggregate brain region defined as those areas of cerebral cortex receiving direct synaptic input from the olfactory bulb (Price, 1973). It usually includes the piriform cortex and sometimes other areas.
        meaning: UBERON:0002894
      olfactory entorhinal cortex:
        description: A part of the entorhinal area defined on the basis of connectivity. It is the rostral portion, which receives a projection from the olfactory bulb (Price-90)-Adapted from Brain Info.
        meaning: UBERON:0022453
      olfactory trigone:
        description: A small triangular area in front of the anterior perforated substance. Its apex, directed forward, occupies the posterior part of the olfactory sulcus, and is brought into view by throwing back the olfactory tract (adapted from Wikipedia).
        meaning: UBERON:0002922

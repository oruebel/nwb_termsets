      operculum of brain:
        description: The most posterior portion of the inferior frontal gyrus of the frontal lobe in the brain. In an axial plane, the Sylvian fissure extends from the operculum posteriorly to divide the frontal from the temporal lobe. Broca's area is a notable part of the operculum, which plays a key role in conversation or speech production, reading and writing. Its vascular supply comes from the M3 branches of the middle cerebral artery[WP].
        meaning: UBERON:0010262
      orbital gyri complex:
        description: 'UBERON region ''orbital gyri complex'' (UBERON:0022695). Synonyms: orbital gyri complex, orgital_gyri.'
        meaning: UBERON:0022695
      orbital operculum:
        description: 'UBERON region ''orbital operculum'' (UBERON:0002593). Synonyms: frontal core, gigantopyramidal area 4, operculum orbitale.'
        meaning: UBERON:0002593
      P1 area of pallium (Myxiniformes):
        description: Most superficial of the areas of the pallium in the enlarged evaginated telencephalon of hagfishes.
        meaning: UBERON:0014751
      P2 area of pallium (Myxiniformes):
        description: Area directly deep to the P1 area of pallium in hagfishes.
        meaning: UBERON:0014752
      P3 area of pallium (Myxiniformes):
        description: Area directly deep to the P2 area of pallium in hagfishes.
        meaning: UBERON:0014753
      P4 area of pallium (Myxiniformes):
        description: Area directly deep to the P3 area of pallium in hagfishes.
        meaning: UBERON:0014754
      P5 area of pallium (Myxiniformes):
        description: Most deep of the areas of the pallium in the enlarged evaginated telencephalon of hagfishes.
        meaning: UBERON:0014755
      paleocortex:
        description: Part of the allocortex defined on the basis of cytoarchitecture. The other two are archicortex and periallocortex. It consists of very thin, primitive cortex with few clearly defined layers. It is distinguished ontogenetically by the fact that it does not develop through a cortical plate. It includes the olfactory bulb, accessory olfactory bulb, olfactory tubercle, septum, prepyriform area and periamygdalar area ( Stephan-1975 ). (adapted from Brain Info).
        meaning: UBERON:0014735
      pallium:
        description: Dorsal part (roof region) of the telencephalon[GO].
        meaning: UBERON:0000203
      paracingulate gyrus:
        description: 'UBERON region ''paracingulate gyrus'' (UBERON:0022398). Synonyms: PaCG, paracingulate gyrus (PAC).'
        meaning: UBERON:0022398
      paraflocculus:
        description: 'UBERON region ''paraflocculus'' (UBERON:0005351). Synonyms: cerebellar tonsil, hemispheric lobule IX, neuraxis paraflocculus.'
        meaning: UBERON:0005351
      paramedian lobule:
        description: The anterior portion of the posteroinferior lobule of the cerebellum, the posterior portion being the semilunar lobule inferior; the two are continuous with the tuber of the vermis.
        meaning: UBERON:0005349
      parapyramidal nucleus:
        description: A small group of cells located lateral to the pyramid of the medulla in the rat and the mouse that functionally it belongs to the reticular formation of the subcortical motor system.
        meaning: UBERON:8440025
      parapyramidal nucleus, deep part:
        description: The part of the parapyramidal nucleus that is closely adjacent to the inner surface of the pyramidal tract.
        meaning: UBERON:8440026
      parapyramidal nucleus, superficial part:
        description: The part of the parapyramidal nucleus that is located on the ventral surface of the medulla lateral to the pyramidal tract.
        meaning: UBERON:8440027
      parasubiculum:
        description: A transitional zone between the presubiculum and the entorhinal area in the mouse (Paxinos-2001), the rat (Swanson-1998) and the primate (Zilles-1990). Defined on the basis of cytoarchitecture, it is more similar to the presubiculum than to the entorhinal area (Zilles-1990). (from Brain Info).
        meaning: UBERON:0004683

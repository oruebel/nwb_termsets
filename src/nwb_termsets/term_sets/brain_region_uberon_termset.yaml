    permissible_values:
      A lamina of the lateral geniculate nucleus (sensu Mustela putorius furo):
        description: A major laminae of the lateral geniculate nucleus of the ferret receiving crossed retinal inputs, located medial to the C laminae and lateral to the A1 and P laminae.
        meaning: UBERON:8440067
      A1 lamina of the lateral geniculate nucleus (sensu Mustela putorius furo):
        description: A major laminae of the lateral geniculate nucleus of the ferret receiving uncrossed retinal inputs, located medial to the C and A laminae (Linden, Guillery & Cucchiaro, 1981)
        meaning: UBERON:8440068
      A10 dopaminergic cell group:
        description: 'UBERON region ''A10 dopaminergic cell group'' (UBERON:0036005). Synonyms: A10 cell group, dopaminergic group A10.'
        meaning: UBERON:0036005
      A11 dopaminergic cell group:
        description: 'UBERON region ''A11 dopaminergic cell group'' (UBERON:0036006). Synonyms: A11 cell group, A11 dopamine cells, dopaminergic group A11.'
        meaning: UBERON:0036006
      A12 dopaminergic cell group:
        description: 'UBERON region ''A12 dopaminergic cell group'' (UBERON:0036009). Synonyms: A12 cell group, A12 dopamine cells, dopaminergic group A12.'
        meaning: UBERON:0036009
      A13 dopaminergic cell group:
        description: A group of cells that fluoresce for dopamine and are distributed in clusters that, in the primate, are ventral and medial to the mammillothalamic tract of the hypothalamus; a few extend into the reuniens nucleus of the thalamus (Felten-1983). In the mouse A13 is located ventral to the mammillothalamic tract of the thalamus in the zona incerta (adapted from Brain Info).
        meaning: UBERON:0036007
      A14 dopaminergic cell group:
        description: 'UBERON region ''A14 dopaminergic cell group'' (UBERON:0036001). Synonyms: A14 cell group, A14 dopamine cells, cell group A14.'
        meaning: UBERON:0036001
      A15 dopaminergic cell group:
        description: 'UBERON region ''A15 dopaminergic cell group'' (UBERON:0036002). Synonyms: A15 cell group, dopaminergic group A15.'
        meaning: UBERON:0036002
      A16 dopaminergic cell group:
        description: 'UBERON region ''A16 dopaminergic cell group'' (UBERON:0036008). Synonyms: A16 cell group, dopaminergic group A16.'
        meaning: UBERON:0036008
      A17 dopaminergic cell group:
        description: 'UBERON region ''A17 dopaminergic cell group'' (UBERON:0036004). Synonyms: A17 cell group, dopaminergic group A17.'
        meaning: UBERON:0036004
      A8 dopaminergic cell group:
        description: 'UBERON region ''A8 dopaminergic cell group'' (UBERON:0036000). Synonyms: A8 cell group, A8 dopamine cells, dopaminergic group A8.'
        meaning: UBERON:0036000
      A9 dopaminergic cell group:
        description: 'UBERON region ''A9 dopaminergic cell group'' (UBERON:0036003). Synonyms: A9 cell group, dopaminergic group A9.'
        meaning: UBERON:0036003
      Aaq dopaminergic cell group:
        description: 'UBERON region ''Aaq dopaminergic cell group'' (UBERON:0036010). Synonyms: Aaq cell group, dopaminergic group Aaq.'
        meaning: UBERON:0036010
      accessory olfactory bulb:
        description: 'Projection notes: Site of termination of vomeronasal nerve; projects to: other parts of pallial amygdala, medial amygdala, subpallial nucleus (Butler and Hodos)'
        meaning: UBERON:0004069
      agranular insular cortex:
        description: Agranular region of the insular cortex.
        meaning: UBERON:0034893
      alar central lobule:
        description: The lobulus centralis is a small square lobule, situated in the anterior cerebellar notch. It overlaps the lingula, from which it is separated by the precentral fissure; laterally, it extends along the upper and anterior part of each hemisphere, where it forms a wing-like prolongation, the alar central lobule. [WP,unvetted].
        meaning: UBERON:0003013
      allocortex:
        description: The allocortex is composed of hippocampal and olfactory structures, which usually display three-layered organization[Brainspan]
        meaning: UBERON:0014734
      ambient gyrus:
        description: A rostral part of the parahippocampal gyrus.
        meaning: UBERON:0036164
      Ammon's horn:
        description: A part of the brain consisting of a three layered cortex located in the forebrain bordering the medial surface of the lateral ventricle. The term hippocampus is often used synonymously with hippocampal formation which consists of the hippocampus proper or Cornu Ammonis, the dentate gyrus and the subiculum.
        meaning: UBERON:0001954
      amygdalohippocampal area, magnocellular division:
        description: 'UBERON region ''amygdalohippocampal area, magnocellular division'' (UBERON:0035027). Synonyms: AHiAm.'
        meaning: UBERON:0035027
      amygdalohippocampal area, parvocellular division:
        description: 'UBERON region ''amygdalohippocampal area, parvocellular division'' (UBERON:0035028). Synonyms: AHiAp.'
        meaning: UBERON:0035028
      amygdalohippocampal transition area:
        description: 'UBERON region ''amygdalohippocampal transition area'' (UBERON:0035026). Synonyms: AHTA.'
        meaning: UBERON:0035026
      amygdalopiriform transition area:
        description: 'UBERON region ''amygdalopiriform transition area'' (UBERON:0034989). Synonyms: amygdalopiriform TA, amygdalopiriform transition area, postpiriform transition area.'
        meaning: UBERON:0034989
      ansiform lobule:
        description: A lobule comprising the greater part of the hemisphere of the cerebellum; its superior and inferior surfaces are separated by the horizontal fissure into major parts known as crus I (superior semilunar lobule) and crus II (inferior semilunar lobule).
        meaning: UBERON:0005348
      ansiform lobule crus I:
        description: Missing definition for term UBERON:0005976. Please replace it using linked reference.
        meaning: UBERON:0005976
      ansiform lobule crus II:
        description: Missing definition for term UBERON:0005977. Please replace it using linked reference.
        meaning: UBERON:0005977
      anterior cingulate cortex:
        description: The frontal part of the cingulate cortex that resembles a collar form around the corpus callosum. It includes both the ventral and dorsal areas of the cingulate cortex. Wikipedia:File:Gray727.svg.
        meaning: UBERON:0009835
      anterior corona radiata:
        description: 'UBERON region ''anterior corona radiata'' (UBERON:0022425). Synonyms: anterior portion of corona radiata, cor-a.'
        meaning: UBERON:0022425
      anterior division of bed nuclei of stria terminalis:
        description: One of two divisions of the nuclei of stria terminalis based on topology, connectivity and multiple stains in the rat ( Swanson-2004 ) and the mouse ( Dong-2004 ). The other division consists of the posterior nuclei of stria terminalis. The anterior division includes the anterolateral area of stria terminalis, anteromedial area of stria terminalis, oval nucleus of stria terminalis, juxtacapsular nucleus of stria terminalis, rhomboid nucleus of stria terminalis, dorsomedial nucleus of stria terminalis, fusiform nucleus of stria terminalis, ventral nucleus of stria terminalis, and the magnocellular nucleus of stria terminalis.
        meaning: UBERON:0011173
      anterior ectosylvian visual area (sensu Mustela putorius furo):
        description: A multimodal area in the ferret responsive to visual, somatic, and auditory stimuli. The anterior border of AEV is coincident with the anterior portion of the ectosylvian gyrus containing higher order somatosensory cortical areas and the posterior border abuts higher order auditory cortical areas.
        meaning: UBERON:8440063
      anterior hypothalamic region:
        description: 'UBERON region ''anterior hypothalamic region'' (UBERON:0002550). Synonyms: AHR, anterior hypothalamic area, chiasmal zone.'
        meaning: UBERON:0002550
      anterior lobe of cerebellum:
        description: The region of the cerebellum that is anterior to the primary fissure.
        meaning: UBERON:0002131
      anterior median eminence:
        description: 'UBERON region ''anterior median eminence'' (UBERON:0002648). Synonyms: AME, eminentia mediana anterior.'
        meaning: UBERON:0002648
      anterior nucleus of hypothalamus anterior part:
        description: 'UBERON region ''anterior nucleus of hypothalamus anterior part'' (UBERON:0014589). Synonyms: AHNa, anterior hypothalamic nucleus anterior part, anterior hypothalamic nucleus, anterior part.'
        meaning: UBERON:0014589
      anterior nucleus of hypothalamus central part:
        description: 'UBERON region ''anterior nucleus of hypothalamus central part'' (UBERON:0014590). Synonyms: AHNc, anterior hypothalamic area central part, anterior hypothalamic area, central part.'
        meaning: UBERON:0014590
      anterior nucleus of hypothalamus dorsal part:
        description: 'UBERON region ''anterior nucleus of hypothalamus dorsal part'' (UBERON:0014592). Synonyms: AHNd, anterior hypothalamic dorsal part, anterior hypothalamic nucleus dorsal part.'
        meaning: UBERON:0014592
      anterior nucleus of hypothalamus posterior part:
        description: 'UBERON region ''anterior nucleus of hypothalamus posterior part'' (UBERON:0014591). Synonyms: AHNp, anterior hypothalamic nucleus posterior part, anterior hypothalamic nucleus, posterior part.'
        meaning: UBERON:0014591
      anterior parahippocampal gyrus:
        description: The part of the parahippocampal gyrus that includes the perirhinal and entorhinal cortices.
        meaning: UBERON:0022383
      anterior perforated substance:
        description: 'Regional part of telencephalon lying on the basal surface and bounded by the olfactory trigone rostrally, the diagonal band medially and caudally and the prepiriform cortex laterally. It is characterized by many perforations caused by small blood vessels entering the gray matter (Meyer et al., J. Comp. Neurol 284: 405, 1989).'
        meaning: UBERON:0018141
      anterior quadrangular lobule:
        description: 'UBERON region ''anterior quadrangular lobule'' (UBERON:0003015). Synonyms: anterior crescentic lobule of cerebellum, anterior quadrangular lobule of cerebellum [H IV et V], anterior quadrangular lobule of cerebellum.'
        meaning: UBERON:0003015
      anterior segment of paracentral lobule:
        description: 'UBERON region ''anterior segment of paracentral lobule'' (UBERON:0035932). Synonyms: PCLa, anterior part of paracentral lobule, medial segment of precentral gyrus.'
        meaning: UBERON:0035932
      anterior temporal fusiform gyrus:
        description: 'UBERON region ''anterior temporal fusiform gyrus'' (UBERON:0022396). Synonyms: occipitotemporal (fusiform) gyrus, anterior division.'
        meaning: UBERON:0022396
      anterior transverse temporal area 41:
        description: A subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. It occupies the anterior transverse temporal gyrus (H) in the bank of the lateral sulcus on the dorsal surface of the temporal lobe. Cytoarchitecturally it is bounded medially by the parainsular area 52 (H) and laterally by the posterior transverse temporal area 42 (H) (Brodmann-1909). Adapted from Brain Info.
        meaning: UBERON:0006095
      anterolateral lateral suprasylvian visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret that lies on the lateral bank of the suprasylvian sulcus, posterior to SIII, anterior to area PLLS and medial to A1.
        meaning: UBERON:8440055
      anterolateral visual area:
        description: 'UBERON region ''anterolateral visual area'' (UBERON:0035894). Synonyms: VISal.'
        meaning: UBERON:0035894
      anterolateral visual area, layer 5:
        description: 'UBERON region ''anterolateral visual area, layer 5'' (UBERON:0035908). Synonyms: VISal5.'
        meaning: UBERON:0035908
      anteromedial lateral suprasylvian visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret that lies medial to the fundus in the suprasylvian sulcus, posterior to the MRSS and anterior to the PMLS.
        meaning: UBERON:8440054
      anteromedial visual area:
        description: 'UBERON region ''anteromedial visual area'' (UBERON:0035893). Synonyms: VISam.'
        meaning: UBERON:0035893
      anteromedial visual area, layer 5:
        description: 'UBERON region ''anteromedial visual area, layer 5'' (UBERON:0035913). Synonyms: VISam5.'
        meaning: UBERON:0035913
      archicortex:
        description: A portion of the cerebral cortex that, with the paleocortex, develops in association with the olfactory system, and which is phylogenetically older than the neocortex and lacks its layered structure. The embryonic archicortex corresponds to the cortex of the dentate gyrus and hippocampus in mature mammals. Being part of the limbic system, it has functions related to emotions and formation of memory. Signals being sent from the limbic lobe to the hippocampal formations can go via the archicortex as an intermediate.
        meaning: UBERON:0002961
      arcopallium:
        description: A pallial region found in avias that partially overlap regions homologous to the amygdala of mammals.
        meaning: UBERON:0007350
      area postrema:
        description: A small, rounded eminence on each side of the fourth ventricle, which receives nerve fibers from the solitary nucleus , spinal cord, and adjacent areas of the medulla. The area postrema lies outside the blood-brain barrier and its functions include acting as an emetic chemoreceptor.
        meaning: UBERON:0002162
      association cortex:
        description: Region of the cerebral cortex that integrates diverse sensory or motor information for purposeful action.
        meaning: UBERON:0035015
      auditory cortex:
        description: The part of the brain that is the ultimate target of afferent auditory information.
        meaning: UBERON:0001393
      barrel cortex:
        description: One of the discrete functional units of the somatosensory cortex that processes tactile information derived from the vibrissae.
        meaning: UBERON:0010415
      basal forebrain:
        description: A region of the brain consisting of ventral and rostral subcortical regions of the telencephalon, including among others, the basal ganglia, septal nuclei, amygdala, ventral pallidum, substantia innominata, and basal nucleus of Meynert.
        meaning: UBERON:0002743
      basal part of pons:
        description: Ventral subdivision of the pons which consists of the massive pontine pertuberance on pontine ventral surface.
        meaning: UBERON:0002567
      basis pontis:
        description: The basis pontis is the anterior portion of the pons.
        meaning: UBERON:0024110
      bed nuclei of the stria terminalis oval nucleus:
        description: Part of bed nucleus of stria terminalis, comprising a distinct, large, egg-shaped collection of neurons that, together with the juxtacapsular (Ju) and rhomboid (Rh) nuclei, encompass the anterolateral area of the BST (Ju and Swanson, 1989).
        meaning: UBERON:0023958
      brain:
        description: The brain is the center of the nervous system in all vertebrate, and most invertebrate, animals. Some primitive animals such as jellyfish and starfish have a decentralized nervous system without a brain, while sponges lack any nervous system at all. In vertebrates, the brain is located in the head, protected by the skull and close to the primary sensory apparatus of vision, hearing, balance, taste, and smell[WP].
        meaning: UBERON:0000955
      brainstem:
        description: '''brainstem'' is a loose term that sometimes refers to the ventral parts o the brain except for any part of the telencephalon - sometimes it includes the diencephalon or subpallial telencephalon structures (ISBN:0471888893). Here we use it in a more restriced sense, to include only the medulla oblongata, pons (when present) and the midbrain tegmentum (following the ZFA definitions).'
        meaning: UBERON:0002298
      Brodmann (1909) area 1:
        description: Missing definition for term UBERON:0006099. Please replace it using linked reference.
        meaning: UBERON:0006099
      Brodmann (1909) area 10:
        description: Brodmann area 10, or BA10, is part of the frontal cortex in the human brain. BA10 encompasses the most anterior part of the frontal cortex, known as the frontopolar region. This area is believed to play a part in strategic processes involved in memory retrieval and executive function. This area is also called frontopolar area 10, and it refers to a subdivision of the cytoarchitecturally defined frontal region of cerebral cortex. It occupies the most rostral portions of the superior frontal gyrus and the middle frontal gyrus. In humans, on the medial aspect of the hemisphere it is bounded ventrally by the superior rostral sulcus (H). It does not extend as far as the cingulate sulcus. Cytoarchitecturally it is bounded dorsally by the granular frontal area 9, caudally by the middle frontal area 46, and ventrally by the orbital area 47 and by the rostral area 12 or, in an early version of Brodmann's cortical map (Brodmann-1909), the prefrontal Brodmann area 11-1909.
        meaning: UBERON:0013541
      Brodmann (1909) area 11:
        description: Brodmann area 11 is one of Brodmann's cytologically defined regions of the brain. It is involved in planning, reasoning, and decision making.
        meaning: UBERON:0013528
      Brodmann (1909) area 12:
        description: 'Brodmann area 12 is a subdivision of the cerebral cortex of the guenon defined on the basis of cytoarchitecture. It occupies the most rostral portion of the frontal lobe. Brodmann-1909 did not regard it as homologous, either topographically or cytoarchitecturally, to rostral area 12 of the human. Distinctive features (Brodmann-1905): a quite distinct internal granular layer (IV) separates slender pyramidal cells of the external pyramidal layer (III) and the internal pyramidal layer (V); the multiform layer (VI) is expanded, contains widely dispersed spindle cells and merges gradually with the underlying cortical white matter; all cells, including the pyramidal cells of the external and internal pyramidal layers are inordinately small; the internal pyramidal layer (V) also contains spindle cells in groups of two to five located close to its border with the internal granular layer (IV).'
        meaning: UBERON:0013543
      Brodmann (1909) area 13:
        description: Brodmann area 13 is a subdivision of the cerebral cortex as defined on the guenon monkey and on the basis of cytoarchitecture. Brodmann area 13 is found in humans, however it seems to act as a bridge between the lateral and medial layers of the brain. Thus it is sometimes misidentified as not being a Brodmann area.
        meaning: UBERON:0013544
      Brodmann (1909) area 14:
        description: Brodmann Area 14 is one of Brodmann's subdivisions of the cerebral cortex in the brain. It was defined by Brodmann in the guenon monkey. No equivalent structure exists in humans.
        meaning: UBERON:0013545
      Brodmann (1909) area 15:
        description: Brodmann Area 15 is one of Brodmann's subdivisions of the cerebral cortex in the brain. Area 15 was defined by Brodmann in the guenon monkey, but he found no equivalent structure in humans. However, functional imaging experiments have found structures that may be homologous.
        meaning: UBERON:0013546
      Brodmann (1909) area 16:
        description: Brodmann area 16 is a subdivision of the cerebral cortex of the guenon defined on the basis of cytoarchitecture. It is a relatively undifferentiated cortical area that Brodmann regarded as part of the insula because of the relation of its innermost multiform layer (VI) with the claustrum (VICl). The laminar organization of cortex is almost totally lacking. The molecular layer (I) is wide as in area 15 of Brodmann-1905. The space between layer I and layer VI is composed of a mixture of pyramidal cells and spindle cells with no significant number of granule cells. Pyramidal cells clump in the outer part to form glomeruli similar to those seen in some of the primary olfactory areas (Brodmann-1905). This term also refers to an area known as peripaleocortical claustral - a cytoarchitecturally defined (agranular) portion of the insula at its rostral extreme where it approaches most closely the claustrum and the prepyriform area (Stephan-76).
        meaning: UBERON:0013547
      Brodmann (1909) area 17:
        description: This term was split out from primary visual cortex as many of the axioms and annotations were specific to primates or humans.
        meaning: UBERON:8440010
      Brodmann (1909) area 18:
        description: 'UBERON region ''Brodmann (1909) area 18'' (UBERON:0006473). Synonyms: B09-18, B09-18, BA18.'
        meaning: UBERON:0006473
      Brodmann (1909) area 19:
        description: Brodmann area 19, or BA19, is part of the occipital lobe cortex in the human brain. Along with area 18, it comprises the extrastriate (or peristriate) cortex. In normally-sighted humans, extrastriate cortex is a visual association area, with feature-extracting, shape recognition, attentional, and multimodal integrating functions. This area is also known as peristriate area 19, and it refers to a subdivision of the cytoarchitecturally defined occipital region of cerebral cortex. In the human it is located in parts of the lingual gyrus, the cuneus, the lateral occipital gyrus (H) and the superior occipital gyrus (H) of the occipital lobe where it is bounded approximately by the parieto-occipital sulcus. Cytoarchitecturally it is bounded on one side by the parastriate area 18 which it surrounds. Rostrally it is bounded by the angular area 39 (H) and the occipitotemporal area 37 (H) (Brodmann-1909).
        meaning: UBERON:0013550
      Brodmann (1909) area 2:
        description: 'UBERON region ''Brodmann (1909) area 2'' (UBERON:0013533). Synonyms: B09-2, B09-2, BA2.'
        meaning: UBERON:0013533
      Brodmann (1909) area 20:
        description: Brodmann area 20, or BA20, is part of the temporal cortex in the human brain. The region encompasses most of the ventral temporal cortex, a region believed to play a part in high-level visual processing and recognition memory. This area is also known as inferior temporal area 20, and it refers to a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. In the human it corresponds approximately to the inferior temporal gyrus. Cytoarchitecturally it is bounded medially by the ectorhinal area 36 (H), laterally by the middle temporal area 21, rostrally by the temporopolar area 38 (H) and caudally by the occipitotemporal area 37 (H) (Brodmann-1909).
        meaning: UBERON:0013551
      Brodmann (1909) area 21:
        description: Brodmann area 21, or BA21, is part of the temporal cortex in the human brain. The region encompasses most of the lateral temporal cortex, a region believed to play a part in auditory processing and language. Language function is left lateralized in most individuals. BA21 is superior to BA20 and inferior to BA40 and BA41. This area is also known as middle temporal area 21. It is a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. In the human it corresponds approximately to the middle temporal gyrus. It is bounded rostrally by the temporopolar area 38 (H), ventrally by the inferior temporal area 20, caudally by the occipitotemporal area 37 (H), and dorsally by the superior temporal area 22 (Brodmann-1909). [WP,unvetted].
        meaning: UBERON:0013552
      Brodmann (1909) area 22:
        description: Brodmann area 22 is one of Brodmann's cytologically defined regions of the brain. It is involved in auditory processing.
        meaning: UBERON:0013553
      Brodmann (1909) area 23:
        description: 'The term area 23 of Brodmann-1909 refers to a subdivision of the cerebral cortex of the guenon defined on the basis of cytoarchitecture. Brodmann regarded it as topographically and cytoarchitecturally homologous to the combined ventral posterior cingulate area 23 and dorsal posterior cingulate area 31 of the human (Brodmann-1909). Distinctive Features (Brodmann-1905): the cortex is relatively thin; smaller cells predominate; the cell density of the multiform layer (VI) is great, producing a distinct boundary with the subcortical white matter; the internal granular layer (IV) is rather well developed; the internal pyramidal layer (V) contains a dense population of round, medium-sized ganglion cells concentrated at the border with layer IV; layers V and VI are narrow with a distinct mutual boundary.nn* Definition Source NeuroNames.'
        meaning: UBERON:0013554
      Brodmann (1909) area 24:
        description: Missing definition for term UBERON:0006101. Please replace it using linked reference.
        meaning: UBERON:0006101
      Brodmann (1909) area 25:
        description: Brodmann area 25 (BA25) is an area in the cerebral cortex of the brain and delineated based on its cytoarchitectonic characteristics. It is also called the subgenual area or area subgenualis. It is the 25th 'Brodmann area' defined by Korbinian Brodmann (thus its name). BA25 is located in the cingulate region as a narrow band in the caudal portion of the subcallosal area adjacent to the paraterminal gyrus. The posterior parolfactory sulcus separates the paraterminal gyrus from BA25. Rostrally it is bound by the prefrontal area 11 of Brodmann.
        meaning: UBERON:0013556
      Brodmann (1909) area 26:
        description: 'UBERON region ''Brodmann (1909) area 26'' (UBERON:0004718). Synonyms: B09-26, B09-26, BA26.'
        meaning: UBERON:0004718
      Brodmann (1909) area 27:
        description: Area 27 of Brodmann-1909 is a cytoarchitecturally defined cortical area that is a rostral part of the parahippocampal gyrus of the guenon (Brodmann-1909). It is commonly regarded as a synonym of presubiculum (Crosby-62). [WP,unvetted].
        meaning: UBERON:0013558
      Brodmann (1909) area 28:
        description: 'UBERON region ''Brodmann (1909) area 28'' (UBERON:0013559). Synonyms: area 28 of Brodmann (Crosby), area 28 of Brodmann, B09-28.'
        meaning: UBERON:0013559
      Brodmann (1909) area 29:
        description: Brodmann area 29, also known as granular retrolimbic area 29 or granular retrosplenial cortex, is a cytoarchitecturally defined portion of the retrosplenial region of the cerebral cortex. In the human it is a narrow band located in the isthmus of cingulate gyrus. Cytoarchitecturally it is bounded internally by the ectosplenial area 26 and externally by the agranular retrolimbic area 30 (Brodmann-1909).
        meaning: UBERON:0004717
      Brodmann (1909) area 3:
        description: Missing definition for term UBERON:0006100. Please replace it using linked reference.
        meaning: UBERON:0006100
      Brodmann (1909) area 30:
        description: Brodmann area 30, also known as agranular retrolimbic area 30, is a subdivision of the cytoarchitecturally defined retrosplenial region of the cerebral cortex. In the human it is located in the isthmus of cingulate gyrus. Cytoarchitecturally it is bounded internally by the granular retrolimbic area 29, dorsally by the ventral posterior cingulate area 23 and ventrolaterally by the ectorhinal area 36 (Brodmann-1909).
        meaning: UBERON:0006474
      Brodmann (1909) area 31:
        description: Brodmann area 31, also known as dorsal posterior cingulate area 31, is a subdivision of the cytoarchitecturally defined cingulate region of the cerebral cortex. In the human it occupies portions of the posterior cingulate gyrus and medial aspect of the parietal lobe. Approximate boundaries are the cingulate sulcus dorsally and the parieto-occipital sulcus caudally. It partially surrounds the subparietal sulcus, the ventral continuation of the cingulate sulcus in the parietal lobe. Cytoarchitecturally it is bounded rostrally by the ventral anterior cingulate area 24, ventrally by the ventral posterior cingulate area 23, dorsally by the gigantopyramidal area 4 and preparietal area 5 and caudally by the superior parietal area 7 (H) (Brodmann-1909).
        meaning: UBERON:0006475
      Brodmann (1909) area 32:
        description: The Brodmann area 32, also known in the human brain as the dorsal anterior cingulate area 32, refers to a subdivision of the cytoarchitecturally defined cingulate region of cerebral cortex. In the human it forms an outer arc around the anterior cingulate gyrus. The cingulate sulcus defines approximately its inner boundary and the superior rostral sulcus (H) its ventral boundary; rostrally it extends almost to the margin of the frontal lobe. Cytoarchitecturally it is bounded internally by the ventral anterior cingulate area 24, externally by medial margins of the agranular frontal area 6, intermediate frontal area 8, granular frontal area 9, frontopolar area 10, and prefrontal area 11-1909. (Brodmann19-09). Dorsal region of anterior cingulate gyrus is associated with rational thought processes, most notably active during the Stroop task.
        meaning: UBERON:0013560
      Brodmann (1909) area 33:
        description: Brodmann area 33, also known as pregenual area 33, is a subdivision of the cytoarchitecturally defined cingulate region of cerebral cortex. It is a narrow band located in the anterior cingulate gyrus adjacent to the supracallosal gyrus in the depth of the callosal sulcus, near the genu of the corpus callosum. Cytoarchitecturally it is bounded by the ventral anterior cingulate area 24 and the supracallosal gyrus (Brodmann-1909).
        meaning: UBERON:0006476
      Brodmann (1909) area 34:
        description: Brodmann area 34 is a part of the brain. It has been described as part of the entorhinal area. It has been described as part of the superior temporal gyrus.
        meaning: UBERON:0006477
      Brodmann (1909) area 35:
        description: Brodmann area 35, together with Brodmann area 36, is most frequently referred to as perirhinal cortex.
        meaning: UBERON:0006102
      Brodmann (1909) area 36:
        description: Ectorhinal area 36 is a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. With its medial boundary corresponding approximately to the rhinal sulcus it is located primarily in the fusiform gyrus. Cytoarchitecturally it is bounded laterally and caudally by the inferior temporal area 20, medially by the perirhinal area 35 and rostrally by the temporopolar area 38 (H) (Brodmann-1909). Together with Brodmann area 35, it comprises the perirhinal cortex.
        meaning: UBERON:0006104
      Brodmann (1909) area 37:
        description: Brodmann area 37, or BA37, is part of the temporal cortex in the human brain. This area is known as occipitotemporal area 37 (H). It is a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. It is located primarily in the caudal portions of the fusiform gyrus and inferior temporal gyrus on the mediobasal and lateral surfaces at the caudal extreme of the temporal lobe. Cytoarchitecturally it is bounded caudally by the peristriate Brodmann area 19, rostrally by the inferior temporal area 20 and middle temporal area 21 and dorsally on the lateral aspect of the hemisphere by the angular area 39 (H) (Brodmann-1909).
        meaning: UBERON:0006478
      Brodmann (1909) area 38:
        description: Brodmann area 38, also BA38 or temporopolar area 38 (H), is part of the temporal cortex in the human brain. BA 38 is at the anterior end of the temporal lobe, known as the temporal pole. BA38 is a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. It is located primarily in the most rostral portions of the superior temporal gyrus and the middle temporal gyrus. Cytoarchitecturally it is bounded caudally by the inferior temporal area 20, the middle temporal area 21, the superior temporal area 22 and the ectorhinal area 36 (Brodmann-1909). Cytoarchitectonic and chemoarchitectonic studies find that it contains at least seven subareas, one of which, TG, is unique to humans. 'The functional significance of this area TG is not known, but it may bind complex, highly processed perceptual inputs to visceral emotional responses.' This area is among the earliest affected by Alzheimer's disease and the earliest involved at the start of temporal lobe
          seizures.
        meaning: UBERON:0006479
      Brodmann (1909) area 39:
        description: 'UBERON region ''Brodmann (1909) area 39'' (UBERON:0006480). Synonyms: B09-39, B09-39, BA39.'
        meaning: UBERON:0006480
      Brodmann (1909) area 4:
        description: 'The term area 4 of Brodmann-1909 refers to a cytoarchitecturally defined portion of the frontal lobe of the guenon. It is located predominantly in the precentral gyrus. Brodmann-1909 regarded it as topographically and cytoarchitecturally homologous to the human gigantopyramidal area 4 and noted that it occupies a much greater fraction of the frontal lobe in the monkey than in the human. Distinctive features (Brodmann-1905): the cortex is unusually thick; the layers are not distinct; the cells are relatively sparsely distributed; giant pyramidal (Betz) cells are present in the internal pyramidal layer (V); lack of an internal granular layer (IV) such that the boundary between the external pyramidal layer (III) and the internal pyramidal layer (V) is indistinct; lack of a distinct external granular layer (II); a gradual transition from the multiform layer (VI) to the subcortical white matter.'
        meaning: UBERON:0013535
      Brodmann (1909) area 40:
        description: Brodmann area 40, or BA40, is part of the parietal cortex in the human brain. The inferior part of BA40 is in the area of the supramarginal gyrus, which lies at the posterior end of the lateral fissure, in the inferior lateral part of the parietal lobe. It is bounded approximately by the intraparietal sulcus, the inferior postcentral sulcus, the posterior subcentral sulcus and the lateral sulcus. Cytoarchitecturally it is bounded caudally by the angular area 39 (H), rostrally and dorsally by the caudal postcentral area 2, and ventrally by the subcentral area 43 and the superior temporal area 22 (Brodmann-1909). Cytoarchitectonically defined subregions of rostral BA40/the supramarginal gyrus are PF, PFcm, PFm, PFop, and PFt. Area PF is the homologue to macaque area PF, part of the mirror neuron system, and active in humans during imitation. The supramarginal gyrus part of Brodmann area 40 is the region in the inferior parietal lobe that is involved in reading both in
          regards to meaning and phonology. [WP,unvetted].
        meaning: UBERON:0013573
      Brodmann (1909) area 43:
        description: Brodmann area 43 is a subdivision of the cerebral cortex of the guenon defined on the basis of cytoarchitecture. It was described (but not labeled) on the map of cortical areas in Brodmann-1909, and it was regarded as cytoarchitecturally homologous to area 30 of Mauss in 1908 in the guenon and subcentral area 43 of the human (Brodmann-1909). The Vogts found no distinctive architectonic area of the corresponding location in the guenon (Vogts-1919).
        meaning: UBERON:0013561
      Brodmann (1909) area 44:
        description: Broca's area is a region of the inferior frontal gyrus (in the dominant cerebral hemisphere, usually on the left side) that is composed of parts of Brodmanns' areas 44 and 45.
        meaning: UBERON:0006481
      Brodmann (1909) area 45:
        description: Part of the cytoarchitecturally defined frontal region of cerebral cortex. In the human, it occupies the triangular part of the inferior frontal gyrus (human) and, surrounding the anterior horizontal limb of the lateral sulcus (human), a portion of the orbital part of the inferior frontal gyrus (human). Bounded caudally by the anterior ascending limb of the lateral sulcus (human), it borders on the insula in the depth of the lateral sulcus. Cytoarchitectonically it is bounded caudally by the opercular area 44, rostrodorsally by the area 46 of Brodmann (human) and ventrally by the area 47 of Brodmann (human) (Brodmann-1909) (Adapted from Brain Info).
        meaning: UBERON:0006482
      Brodmann (1909) area 46:
        description: Brodmann area 46, or BA46, is part of the frontal cortex in the human brain. It is between BA10 and BA45. BA46 is known as middle frontal area 46. In the human it occupies approximately the middle third of the middle frontal gyrus and the most rostral portion of the inferior frontal gyrus. Brodmann area 46 roughly corresponds with the dorsolateral prefrontal cortex (DLPFC), although the borders of area 46 are based on cytoarchitecture rather than function. The DLPFC also encompasses part of granular frontal area 9, directly adjacent on the dorsal surface of the cortex. Cytoarchitecturally, BA46 is bounded dorsally by the granular frontal area 9, rostroventrally by the frontopolar area 10 and caudally by the triangular area 45 (Brodmann-1909). There is some discrepancy between the extent of BA8 (Brodmann-1905) and the same area as described by Walker (1940).
        meaning: UBERON:0006483
      Brodmann (1909) area 47:
        description: Brodmann area 47, or BA47, is part of the frontal cortex in the human brain. Curving from the lateral surface of the frontal lobe into the ventral (orbital) frontal cortex. It is below areas BA10 and BA45, and beside BA11. This area is also known as orbital area 47. In the human, on the orbital surface it surrounds the caudal portion of the orbital sulcus (H) from which it extends laterally into the orbital part of inferior frontal gyrus (H). Cytoarchitectonically it is bounded caudally by the triangular area 45, medially by the prefrontal area 11 of Brodmann-1909, and rostrally by the frontopolar area 10 (Brodmann-1909). It incorporates the region that Brodmann identified as 'Area 12' in the monkey, and therefore, following the suggestion of Michael Petrides, some contemporary neuroscientists refer to the region as 'BA47/12. ' BA47 has been implicated in the processing of syntax in spoken and signed languages, and more recently in musical syntax.
        meaning: UBERON:0006484
      Brodmann (1909) area 48:
        description: Retrosubicular area 48 is a subdivision of the cytoarchitecturally defined hippocampal region of the cerebral cortex. In the human it is located on the medial surface of the temporal lobe. Cytoarchitectually it is bounded rostrally by the perirhinal area 35 and medially by the presubiculum. While described by Brodmann (Brodmann-1909), it was not included in his areal maps of human cortex (Brodmann-1909; Brodmann-1910).
        meaning: UBERON:0006485
      Brodmann (1909) area 5:
        description: Brodmann area 5 is one of Brodmann's cytologically defined regions of the brain. It is involved in somatosensory processing and association.
        meaning: UBERON:0006471
      Brodmann (1909) area 52:
        description: Parainsular area 52 (H) is a subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. It is located in the bank of the lateral sulcus on the dorsal surface of the temporal lobe. Its medial boundary corresponds approximately to the junction between the temporal lobe and the insula. Cytoarchitecturally it is bounded laterally by the anterior transverse temporal area 42 (H) (Brodmann-1909).
        meaning: UBERON:0006486
      Brodmann (1909) area 6:
        description: Brodmann area 6, or BA6, is part of the frontal cortex in the human brain. Situated just anterior to the primary motor cortex, it is composed of the premotor cortex and, medially, the supplementary motor area, or SMA. This large area of the frontal cortex is believed to play a role in the planning of complex, coordinated movements. Brodmann area 6 is also called agranular frontal area 6 in humans because it lacks an internal granular cortical layer (layer IV). It is a subdivision of the cytoarchitecturally defined precentral region of cerebral cortex. In the human brain, it is located on the portions of the precentral gyrus that are not occupied by the gigantopyramidal area 4; furthermore, BA6 extends onto the caudal portions of the superior frontal and middle frontal gyri. It extends from the cingulate sulcus on the medial aspect of the hemisphere to the lateral sulcus on the lateral aspect. It is bounded rostrally by the granular frontal region and caudally by the
          gigantopyramidal area 4 (Brodmann, 1909).
        meaning: UBERON:0006472
      Brodmann (1909) area 7:
        description: Brodmann area 7 is one of Brodmann's cytologically defined regions of the brain. It is involved in locating objects in space. It serves as a point of convergence between vision and proprioception to determine where objects are in relation to parts of the body.
        meaning: UBERON:0013538
      Brodmann (1909) area 8:
        description: Brodmann area 8 is one of Brodmann's cytologically defined regions of the brain. It is involved in planning complex movements.
        meaning: UBERON:0013539
      Brodmann (1909) area 8a:
        description: 'UBERON region ''Brodmann (1909) area 8a'' (UBERON:0013562). Synonyms: Brodmann area 8a, B09-8a, B09-8a.'
        meaning: UBERON:0013562
      Brodmann (1909) area 9:
        description: Brodmann area 9, or BA9, refers to a cytoarchitecturally defined portion of the frontal cortex in the brain of humans and other primates. It contributes to the dorsolateral and medial prefrontal cortex and plays a role in executive functions such as working memory, planning, inhibition, decision-making, and reasoning. Its cytoarchitecture is referred to as granular due to the concentration of granule cells in layer IV. Its internal pyramidal layer (V) is divisible into two sublayers, an outer layer 5a of densely distributed medium-size ganglion cells that partially merges with layer IV, and an inner, clearer, cell-poor layer 5b; the pyramidal cells of sublayer 3b of the external pyramidal layer (III) are smaller and sparser in distribution; the external granular layer (II) is narrow, with small numbers of sparsely distributed granule cells.
        meaning: UBERON:0013540
      Brodmann area:
        description: 'A segmentation of the cerebral cortex on the basis of cytoarchitecture as described in Brodmann-1905, Brodmann-1909 and Brodmann-10. Maps for several species were presented. NeuroNames includes only areas in the human and in Old World monkeys. Of the latter, Brodmann studied representatives of several species including guenons (one Cercopithecus mona, one Cercocebus torquatus, and one Cercopithecus otherwise unspecified), which are all closely related African species, and one macaque (Macaca mulatta) an Asian species (Brodmann-1905). The legend to the summary map in Brodmann-1909 ascribes the areas simply to Cercopithecus. Brodmann referenced the areas by name and number. The same area number in humans and monkeys did not necessarily refer to topologically or cytoarchitecturally homologous structures. In NeuroNames the standard term for human areas consists of the English translation of Brodmann''s Latin name followed by the number he assigned, e.g., agranular frontal
          area 6; the standard terms for monkey areas are in the format: area 6 of Brodmann-1909. He mapped a portion of areas limited to the banks of sulci, e.g., area 3 of Brodmann-1909 (Brodmann-1909) onto the adjacent, visible surface. This accounts for the fact that some areas appear larger on his surface map than on maps of other authors, e.g., area 3 of Vogts-1919. (Adapted from NeuroNames).'
        meaning: UBERON:0013529
      C lamina of the lateral geniculate nucleus (sensu Mustela putorius furo):
        description: The most lateral laminae of the LGN of the ferret. The C laminae includes the C lamina, which is the innermost layer, followed by C1, C2, and C3 being the outermost lamina.
        meaning: UBERON:8440069
      CA1 field of hippocampus:
        description: Part of hippocampus proper bounded by CA2 and the subiculum, characterized by pyramidal neurons that receive projections from pyramidal neurons of CA3 via the Schaffer collaterals.
        meaning: UBERON:0003881
      CA2 field of hippocampus:
        description: Part of hippocampus proper bounded by areas CA3 and CA1, characterized by a narrow layer of large pyramidal cells, similar in size to CA3 pyramidal cells, but which lack the mossy fiber input from the dentate gyrus (adapted from Paxinos, G. The rat central nervous system, 2nd ed, Academic Press, San Diego, 1995, pg. 460).
        meaning: UBERON:0003882
      CA3 field of hippocampus:
        description: Part of hippocampus proper bounded by the hilus of the dentate gyrus and area CA2, characterized by large pyramidal cells and a dense projection from dentate gyrus granule cell mossy fibers.
        meaning: UBERON:0003883
      CA4 field of hippocampus:
        description: The last of four regions in the cornu ammonis of the hippocampus and is also part of the hilus of the dentate gyrus. This area contains mostly mossy cells that receive inputs from the dentate gyrus and pyramidal cells in the CA3 region and also projects back to the dentate gyrus.
        meaning: UBERON:0003884
      calcar avis of the lateral ventricle:
        description: On the medial wall of the posterior cornu of the lateral ventricle is a longitudinal eminence, the calcar avis (hippocampus minor), which is an involution of the ventricular wall produced by the calcarine fissure. It is sometimes visible on ultrasonogram.
        meaning: UBERON:0035970
      caudal anterior cingulate cortex:
        description: Component of the cingulate cortex. The rostral boundary was the first appearance of the genu of the corpus callosum whereas the caudal boundary was established as the first appearance of the mammillary bodies. The medial boundary was the medial aspect of the cortex. The supero-lateral boundary was the superior frontal gyrus whereas the infero-lateral boundary was the corpus callosum (Christine Fennema-Notestine).
        meaning: UBERON:0028715
      caudal CA1:
        description: 'UBERON region ''caudal CA1'' (UBERON:0034780). Synonyms: CA1C.'
        meaning: UBERON:0034780
      caudal CA2:
        description: 'UBERON region ''caudal CA2'' (UBERON:0034781). Synonyms: CA2C.'
        meaning: UBERON:0034781
      caudal CA3:
        description: 'UBERON region ''caudal CA3'' (UBERON:0034782). Synonyms: CA3C.'
        meaning: UBERON:0034782
      caudal tuberculum:
        description: 'UBERON region ''caudal tuberculum'' (UBERON:2000633). Synonyms: posterior tubercle, posterior tuberculum.'
        meaning: UBERON:2000633
      caudal zone of median tuberal portion of hypothalamus:
        description: UBERON region 'caudal zone of median tuberal portion of hypothalamus' (UBERON:2000634).
        meaning: UBERON:2000634
      central lobule:
        description: The central lobule is a small square lobule, situated in the anterior cerebellar notch. It overlaps the lingula, from which it is separated by the precentral fissure; laterally, it extends along the upper and anterior part of each hemisphere, where it forms a wing-like prolongation, the ala lobuli centralis. [WP,unvetted].
        meaning: UBERON:0003021
      central pretectum:
        description: UBERON region 'central pretectum' (UBERON:2000183).
        meaning: UBERON:2000183
      cerebellar hemisphere:
        description: A paired regions of the cerebellum that lie outside and lateral to the central vermis[MP]. The cerebellum consists of three parts, a median and two lateral, which are continuous with each other, and are substantially the same in structure. The median portion is constricted, and is called the vermis, from its annulated appearance which it owes to the transverse ridges and furrows upon it; the lateral expanded portions are named the hemispheres. The lateral hemisphere is considered the portion of the cerebellum to develop most recently. [WP,unvetted].
        meaning: UBERON:0002245
      cerebellar peduncular complex:
        description: A composite structure of the brain stem, which is subdivided into the superior cerebellar peduncle of pons, the decussation of superior cerebellar peduncle and the superior cerebellar peduncle of midbrain (MM)[NIF, based on NN].
        meaning: UBERON:0002474
      cerebellar vermis:
        description: A subregion of the cerebellar cortex, consisting of the most medial zone of the cerebellar cortex, stradding the midline. May be continuous with the lateral cerebellar hemispheres in some areas of the cerebellum, e.g., dorsally, or separated by deeper fissures in others (e.g., ventrally).
        meaning: UBERON:0004720
      cerebellopontine angle:
        description: Junction between the cerebellum and the pons.
        meaning: UBERON:0014908
      cerebellum:
        description: Part of the metencephalon that lies in the posterior cranial fossa behind the brain stem. It is concerned with the coordination of movement[MESH]. A large dorsally projecting part of the brain concerned especially with the coordination of muscles and the maintenance of bodily equilibrium, situated between the brain stem and the back of the cerebrum , and formed in humans of two lateral lobes and a median lobe[BTO]. Brain structure derived from the anterior hindbrain, and perhaps including posterior midbrain. The cerebellum plays a role in somatic motor function, the control of muscle tone, and balance[ZFA].
        meaning: UBERON:0002037
      cerebellum anterior vermis:
        description: The anterior portion of the narrow middle zone between the two hemispheres of the cerebellum that is located anterior to the primary fissure.
        meaning: UBERON:0003941
      cerebellum hemisphere lobule:
        description: The region of a cerebellar lobule that resides in either of the lateral sections of the cerebellum outside the vermis; in mammals, the vermis portion of the cerebellum has a foliation pattern along the AP axis that is distinct from the lateral cerebellar hemispheres.
        meaning: UBERON:0004003
      cerebellum hemispheric lobule II:
        description: 'UBERON region ''cerebellum hemispheric lobule II'' (UBERON:0023998). Synonyms: alar central lobule, central lobule (hII), hemispheric lobule ii.'
        meaning: UBERON:0023998
      cerebellum hemispheric lobule III:
        description: 'UBERON region ''cerebellum hemispheric lobule III'' (UBERON:0023999). Synonyms: alar central lobule, central lobule (hIII), hemispheric lobule III.'
        meaning: UBERON:0023999
      cerebellum hemispheric lobule IV:
        description: 'UBERON region ''cerebellum hemispheric lobule IV'' (UBERON:0024000). Synonyms: anterior quadrangular lobule, culmen lobule (hIV), hemispheric lobule IV.'
        meaning: UBERON:0024000
      cerebellum hemispheric lobule V:
        description: 'UBERON region ''cerebellum hemispheric lobule V'' (UBERON:0024001). Synonyms: anterior quadrangular lobule, culmen lobule (hV), hemispheric lobule V.'
        meaning: UBERON:0024001
      cerebellum hemispheric lobule VII:
        description: 'UBERON region ''cerebellum hemispheric lobule VII'' (UBERON:0024003). Synonyms: hemispheric lobule VII.'
        meaning: UBERON:0024003
      cerebellum hemispheric lobule X:
        description: 'UBERON region ''cerebellum hemispheric lobule X'' (UBERON:0024009). Synonyms: flocculus, hemispheric lobule X.'
        meaning: UBERON:0024009
      cerebellum intermediate zone:
        description: The paired regions of the cerebellar hemisphere that lie adjacent to the vermis and are between the vermis and lateral regions of the hemispheres; it receives input from the corticopontocerebellar fibers that originate from the motor cortex, and also receives sensory feedback from the muscles; these signals are integrated by this region, to coordinate muscle activity with motor inputs.
        meaning: UBERON:0004006
      cerebellum lobe:
        description: 'A major subdivision of the cerebellum: anterior, posterior and flocculonodular.'
        meaning: UBERON:0005293
      cerebellum lobule:
        description: One of the the ten gyri of the cerebellar cortex.
        meaning: UBERON:0004004
      cerebellum posterior vermis:
        description: The posterior portion of the narrow middle zone between the two hemispheres of the cerebellum that is located posterior to the primary fissure.
        meaning: UBERON:0004009
      cerebellum vermis culmen:
        description: The culmen is the portion of the anterior vermis adjacent to the primary fissure of cerebellum. The culmen and the anterior parts of the quadrangular lobules form the lobus culminis[WP].
        meaning: UBERON:0007763
      cerebellum vermis lobule:
        description: The region of a cerebellar lobule that resides in the central section of the cerebellum between the two hemispheres.
        meaning: UBERON:0004070
      cerebellum vermis lobule I:
        description: Missing definition for term UBERON:0004074. Please replace it using linked reference.
        meaning: UBERON:0004074
      cerebellum vermis lobule II:
        description: Missing definition for term UBERON:0004075. Please replace it using linked reference.
        meaning: UBERON:0004075
      cerebellum vermis lobule III:
        description: Missing definition for term UBERON:0004076. Please replace it using linked reference.
        meaning: UBERON:0004076
      cerebellum vermis lobule IV:
        description: 'UBERON region ''cerebellum vermis lobule IV'' (UBERON:0004077). Synonyms: culmen of cerebellum, lobule IV of cerebellum vermis, neuraxis culmen.'
        meaning: UBERON:0004077
      cerebellum vermis lobule IX:
        description: The uvula is the second largest lobule, following the culmen. It pertains to the paleocerebellum and is separated from the nodule by the posterolateral fissure.
        meaning: UBERON:0004078
      cerebellum vermis lobule V:
        description: Missing definition for term UBERON:0004079. Please replace it using linked reference.
        meaning: UBERON:0004079
      cerebellum vermis lobule VI:
        description: Missing definition for term UBERON:0004080. Please replace it using linked reference.
        meaning: UBERON:0004080
      cerebellum vermis lobule VII:
        description: 'UBERON region ''cerebellum vermis lobule VII'' (UBERON:0004081). Synonyms: lobule VII of cerebellum vermis, folium-tuber vermis (VII), lobule VIIA of vermis.'
        meaning: UBERON:0004081
      cerebellum vermis lobule VIIA:
        description: The folium vermis is a short, narrow, concealed band at the posterior extremity of the vermis, consisting apparently of a single folium, but in reality marked on its upper and under surfaces by secondary fissures. Laterally, it expands in either hemisphere into a considerable lobule, the superior semilunar lobule (lobulus semilunaris superior; postero-superior lobules), which occupies the posterior third of the upper surface of the hemisphere, and is bounded below by the horizontal sulcus. The superior semilunar lobules and the folium vermis form the lobus semilunaris.
        meaning: UBERON:0005345
      cerebellum vermis lobule VIIAf:
        description: 'UBERON region ''cerebellum vermis lobule VIIAf'' (UBERON:0036044). Synonyms: CbVIIa1, VIIAf, lobule VIIAf/crus I (folium and superior semilunar lobule).'
        meaning: UBERON:0036044
      cerebellum vermis lobule VIIAt:
        description: 'UBERON region ''cerebellum vermis lobule VIIAt'' (UBERON:0036065). Synonyms: CbVIIa2, VIIAt, lobule VIIAt/crus II (tuber and inferior semilunar lobule).'
        meaning: UBERON:0036065
      cerebellum vermis lobule VIIB:
        description: Missing definition for term UBERON:0005346. Please replace it using linked reference.
        meaning: UBERON:0005346
      cerebellum vermis lobule VIII:
        description: Missing definition for term UBERON:0004082. Please replace it using linked reference.
        meaning: UBERON:0004082
      cerebellum vermis lobule X:
        description: Missing definition for term UBERON:0004083. Please replace it using linked reference.
        meaning: UBERON:0004083
      cerebrocerebellum:
        description: The part of the cerebellar cortex that receives input from the cerebral cortex via axons from the pontine relay nuclei.
        meaning: UBERON:0014644
      chemoarchitectural part of brain:
        description: Regional part of an anatomical region that is revealed by the use of a stain that reveals chemoarchitecture.
        meaning: UBERON:0024090
      chemoarchitectural part of striatum:
        description: 'UBERON region ''chemoarchitectural part of striatum'' (UBERON:0025736). Synonyms: chemoarchitectural part of neostriatum.'
        meaning: UBERON:0025736
      cingulate cortex:
        description: The cingulate cortex is a part of the brain situated in the medial aspect of the cortex. It is extended from the corpus callosum below to the cingulate sulcus above, at least anteriorly. [WP,unvetted].
        meaning: UBERON:0003027
      cingulate visual area (sensu Mustela putorius furo):
        description: A visual area of the ferret located in the fundus of the splenial sulcus medial to SVA.
        meaning: UBERON:8440066
      circumventricular organ:
        description: Any of any of the secretory or sensory organs located in the brain region around or in relation to the ventricular system that are characterized by extensive vasculature and a lack of a normal blood brain barrier (BBB) and allow for the linkage between the central nervous system and peripheral blood flow.
        meaning: UBERON:0005408
      commissural ganglion (sensu Cancer borealis):
        description: Contains motor fibers that innervate the esophagus. Stimulating the pyloric suppressor neuron alters both pyloric and gastric rhythms but also elicits activity in a third oscillatory circuit located in the commissural ganglia called the esophageal rhythm.
        meaning: UBERON:8910021
      copula pyramidis:
        description: UBERON region 'copula pyramidis' (UBERON:0005347).
        meaning: UBERON:0005347
      core of nucleus accumbens:
        description: 'UBERON region ''core of nucleus accumbens'' (UBERON:0012170). Synonyms: accumbens nucleus core, accumbens nucleus, core, core of nucleus accumbens.'
        meaning: UBERON:0012170
      corpus cerebelli:
        description: 'UBERON region ''corpus cerebelli'' (UBERON:2000188). Synonyms: cerebellar corpus, corpus cerebellum.'
        meaning: UBERON:2000188
      corpus striatum:
        description: '* According to the 1917 version of Gray''s Anatomy, it is the combination of the lentiform nucleus (also known as the lenticular nucleus) and the caudate nucleus * According to BrainInfo it is a part of the basal ganglia comprising the globus pallidus and striatum'
        meaning: UBERON:0000369
      cortical visual area:
        description: The part of the cortex that is responsible for processing visual information.
        meaning: UBERON:8440011
      cytoarchitectural part of dentate gyrus:
        description: 'UBERON region ''cytoarchitectural part of dentate gyrus'' (UBERON:0023564). Synonyms: cytoarchitectural part of dentate gyrus.'
        meaning: UBERON:0023564
      cytoarchitecture of entorhinal cortex:
        description: 'UBERON region ''cytoarchitecture of entorhinal cortex'' (UBERON:0030649). Synonyms: cytoarchitecture of entorhinal cortex.'
        meaning: UBERON:0030649
      dentate gyrus of hippocampal formation:
        description: BTO says dentate gyrus = fascia dentata + hilus. Note that GO classifies dentate gyrus development under hippocampus development
        meaning: UBERON:0001885
      diencephalon:
        description: The division of the forebrain that develops from the foremost primary cerebral vesicle.
        meaning: UBERON:0001894
      dopaminergic cell groups:
        description: Collections of neurons in the central nervous system that have been demonstrated by histochemical fluorescence to contain the neurotransmitter dopamine ( Fuxe-1970 ).
        meaning: UBERON:0035999
      dorsal auditory area:
        description: 'UBERON region ''dorsal auditory area'' (UBERON:0035885). Synonyms: AUDd.'
        meaning: UBERON:0035885
      dorsal auditory area, layer 4:
        description: 'UBERON region ''dorsal auditory area, layer 4'' (UBERON:0035917). Synonyms: AUDd4.'
        meaning: UBERON:0035917
      dorsal cap of Kooy:
        description: 'UBERON region ''dorsal cap of Kooy'' (UBERON:0014286). Synonyms: dorsal cap of kooy.'
        meaning: UBERON:0014286
      dorsal gastric nerve (sensu Cancer borealis):
        description: Nerve carrying dorsal gastric (DG) neurons which control the medial tooth movements in crustaceans.
        meaning: UBERON:8910011
      dorsal hypothalamic area:
        description: ).
        meaning: UBERON:0002954
      dorsal lateral suprasylvian visual cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret located in the lateral bank of the suprasylvian sulcus anterior to VLS and posterior to PLLS.
        meaning: UBERON:8440060
      dorsal pallium:
        description: Subdivision of pallium that is located dorsally.
        meaning: UBERON:0014740
      dorsal peduncular area:
        description: A cytoarchitectonic area on the medial surface of the cerebral hemisphere rostral to the septum, ventral to the infralimbic area and dorsal to the tenia tecta in the mouse and rat.
        meaning: UBERON:8440040
      dorsal periventricular hypothalamus:
        description: UBERON region 'dorsal periventricular hypothalamus' (UBERON:2000199).
        meaning: UBERON:2000199
      dorsal plus ventral thalamus:
        description: Subcortical brain region consisting of paired gray matter bodies in the dorsal diencephalon and forming part of the lateral wall of the third ventricle of the brain. The thalamus represents the major portion of the diencephalon and is commonly divided into cellular aggregates known as nuclear groups.(MeSH). The dorsal topographic division of the interbrain. The macrodissected adult human thalamus was clearly illustrated by Vesalius in 1543 and the term as defined here was introduced by His in 1893. It includes the traditional epithalamus, dorsal thalamus, and ventral thalamus of Herrick (1910, pp. 494, 498). Also see Kuhlenbeck (1927, Ch. 9) and Jones (1985, p. 87).
        meaning: UBERON:0001897
      dorsal tegmental nucleus pars dorsalis:
        description: Part of dorsal tegmental nucleus characterized by round, small cells that are lightly stained in Nissl preparations.
        meaning: UBERON:0014568
      dorsal tegmental nucleus pars ventralis:
        description: Cytoarchitectural part of the dorsal tegmental nucleus based on cell size. The pars ventralis is characterized by medium sized oval or triangular cells that stain darkly in NIssl stains.
        meaning: UBERON:0014569
      dorsal thalamus:
        description: 'UBERON region ''dorsal thalamus'' (UBERON:0004703). Synonyms: dorsal thalamus (Anthoney), dorsal thalamus, dorsal tier of thalamus.'
        meaning: UBERON:0004703
      dorsal ventricular ridge of pallium:
        description: A large expansion of the lateral wall of the telencephalon, located in the pallium. Found in reptiles and birds.
        meaning: UBERON:0014733
      dorsal zone of median tuberal portion of hypothalamus:
        description: UBERON region 'dorsal zone of median tuberal portion of hypothalamus' (UBERON:2000347).
        meaning: UBERON:2000347
      dorsolateral part of supraoptic nucleus:
        description: 'UBERON region ''dorsolateral part of supraoptic nucleus'' (UBERON:0035928). Synonyms: dorsolateral part of the supraoptic nucleus, pars dorsolateralis nuclei supraoptici, supraoptic nucleus proper.'
        meaning: UBERON:0035928
      dorsolateral prefrontal cortex:
        description: The dorsolateral prefrontal cortex (DL-PFC or DLPFC), according to a more restricted definition, is roughly equivalent to Brodmann areas 9 and 46.[1] According to a broader definition DL-PFC consists of the lateral portions of Brodmann areas 9 - 12, of areas 45, 46, and the superior part of area 47.[2] These regions mainly receive their blood supply from the middle cerebral artery. With respect to neurotransmitter systems, there is evidence that dopamine plays a particularly important role in DL-PFC.[2]DL-PFC is connected to the orbitofrontal cortex, and to a variety of brain areas, which include the thalamus, parts of the basal ganglia (the dorsal caudate nucleus), the hippocampus, and primary and secondary association areas of neocortex, including posterior temporal, parietal, and occipital areas.
        meaning: UBERON:0009834
      eminentia granularis:
        description: Definition based on Albert,2001 [Albert JS. 2001. Species Diversity and Phylogenetic systematics of American Knifefishes (Gymnotiformes, Teleostei). Miscellaneous Publications, Museum of Zoology, University of Michigan no. 190:140 pages.]
        meaning: UBERON:2002106
      entopallium:
        description: The major telecephalic thalamorecipient zone of the tectofugal visual system in Aves.
        meaning: UBERON:0014759
      epithalamus:
        description: Most dorsal part of the thalamus, comprising the pineal gland and habenular nuclei in most vertebrates. In a few vertebrates, it also includes the parietal eye. (Butler and Hodos, Comparative Vertebrate Neuroanatomy, 2nd ed, 2005, pg. 345-346.
        meaning: UBERON:0001899
      esophageal ganglion (sensu Cancer borealis):
        description: Neurons with cell bodies in the esophageal ganglion turn on the gastric mill rhythm and strongly affects the pyloric rhythm.
        meaning: UBERON:8910020
      esophageal nerve (sensu Cancer borealis):
        description: innervates the foregut and midgut
        meaning: UBERON:8910019
      extrapyramidal tract system:
        description: A neural network located in the brain that is part of the motor system involved in the coordination of movement that is distinct from the pyramidal tract.
        meaning: UBERON:0035803
      flocculonodular lobe:
        description: The flocculonodular lobe is a lobe of the cerebellum consisting of the nodule and the flocculus. It is closely associated with the vestibulocerebellum. [WP,unvetted].
        meaning: UBERON:0003012
      flocculonodular lobe, hemisphere portion:
        description: 'UBERON region ''flocculonodular lobe, hemisphere portion'' (UBERON:0027331). Synonyms: hemispheric part of the flocculonodular lobe of the cerebellum.'
        meaning: UBERON:0027331
      flocculus:
        description: The small lobe of the cerebellum at the posterior border of the middle cerebellar peduncle anterior to the biventer lobule that receives input from the inferior and medial vestibular nuclei and sends fibers back to the vestibular nuclei, and processes and integrates these signals to allow for the constant maintenance of balance.
        meaning: UBERON:0001063
      floor plate of diencephalon:
        description: A floor plate that is part of a diencephalon [Automatically generated definition].
        meaning: UBERON:0003309
      floor plate of medulla oblongata:
        description: A floor plate that is part of a medulla oblongata [Automatically generated definition].
        meaning: UBERON:0003311
      floor plate of metencephalon:
        description: A floor plate that is part of a metencephalon [Automatically generated definition].
        meaning: UBERON:0003310
      floor plate of midbrain:
        description: A floor plate that is part of a midbrain [Automatically generated definition].
        meaning: UBERON:0003307
      floor plate of telencephalon:
        description: A floor plate that is part of a telencephalon [Automatically generated definition].
        meaning: UBERON:0003308
      forebrain:
        description: The most anterior region of the brain including both the telencephalon and diencephalon.
        meaning: UBERON:0001890
      fourth visual cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret that is caudal to the suprasylvian visual areas and rostral to area 19.
        meaning: UBERON:8440047
      frontal operculum:
        description: Portion of frontal lobe that overlaps the insular cortex (adapted from Wikipedia).
        meaning: UBERON:0002947
      frontal pole:
        description: Component of the frontal lobe. The rostral and caudal boundaries of the frontal pole are the superior frontal gyrus and the rostral division of the middle frontal gyrus respectively (Christine Fennama-Notestine).
        meaning: UBERON:0002795
      functional part of brain:
        description: A brain region defined by functional criteria, e.g. auditory cortex, rather than by structural or histological criteria.
        meaning: UBERON:0035014
      fundus striati:
        description: The ventral portion of the dorsal striatum, linking the caudate nucleus and the putamen anteriorly (adapted from Wikipedia).
        meaning: UBERON:0014605
      gastropyloric nerve (sensu Cancer borealis):
        description: Consists of gastropyloric receptor (GPR) neurons, which are stretch receptors that innervate stomach muscles in crustaceans.
        meaning: UBERON:8910012
      genu of corpus callosum:
        description: Part of corpus callosum comprising the 'kneelike' anterior bend (adapted from Nolte, The Human Brain, 6th ed., 2009 pg 664).
        meaning: UBERON:0015599
      glossopharyngeal lobe:
        description: UBERON region 'glossopharyngeal lobe' (UBERON:2000517).
        meaning: UBERON:2000517
      granular eminence:
        description: UBERON region 'granular eminence' (UBERON:2000212).
        meaning: UBERON:2000212
      granular insular cortex:
        description: Granular region of the insular cortex.
        meaning: UBERON:0034892
      gross anatomical parts of the cerebellum:
        description: 'UBERON region ''gross anatomical parts of the cerebellum'' (UBERON:0023836). Synonyms: gross anatomical parts of the cerebellum.'
        meaning: UBERON:0023836
      gustatory cortex:
        description: The part of the cerebral cortex that is responsible for the perception of taste.
        meaning: UBERON:8440075
      habenula:
        description: A segment of the epithalamus that has as its parts the habenular nuclei and the habenular commissure[FMA,modified].
        meaning: UBERON:0001904
      habenular trigone:
        description: superclass in BTO is thalamic nucleus, not present in most ontologies
        meaning: UBERON:0000445

      parietal operculum:
        description: The parietal operculum, forming the superior bank of the sylvian fissure, as studied in the cat, contains the secondary somatosensory representation, 'S-II', and a second somatotopic representation (parietal ventral, or PV). Anatomically, primate S-II receives inputs from area 3 and area 1, and projects to PV and area 7. PV has projections to area 5 and premotor areas. [WP,unvetted].
        meaning: UBERON:0002911
      periallocortex:
        description: Agranular cortical structures located next to the allocortex.
        meaning: UBERON:0014736
      periamygdaloid cortex:
        description: 'Is located ventral to the basal nucleus and has three subdivisions: the periamygdaloid cortex, the medial division, and the sulcal division.'
        meaning: UBERON:0014537
      pericalcarine cortex:
        description: Component of the parietal lobe. The rostral boundary of the pericalcarine cortex was the first appearance of the calcarine sulcus whereas the caudal boundary was the most posterior coronal slice where the calcarine sulcus was visualized. The medial and lateral boundaries were the medial portion of the temporal and occipital cortices and the inferomedial end of the calcarine sulcus respectively (Christine Fennema-Notestine).
        meaning: UBERON:0022534
      Perigeniculate lamina of the lateral geniculate nucleus (sensu Mustela putorius furo):
        description: A lamina of the LGN in the ferret located medial to the A lamina in the rostral regions of the visual thalamus ((Linden, Guillery & Cucchiaro, 1981; Dell, Innocenti, Hilgetag, & Manger, 2019).
        meaning: UBERON:8440070
      perirhinal cortex:
        description: 'Region of cortex near to the rhinal sulcus. It is defined differently in different nomenclatures, due in part to the lack of agreement on the definition of the border of this region. In the rat, the perirhinal cortex occupies only caudal levels of the rhinal sulcus while in the monkey, it occurpies the full rostrocaudal extent of the rhinal sulcus (Burwell et al., Hippocampus, 5: 390-408, 1995).'
        meaning: UBERON:0006083
      perirhinal cortex of Burwell et al 1995:
        description: Rostral portion of the parahippocampal cortex.
        meaning: UBERON:0023936
      perirhinal cortex of primate of Burwell et al 1995:
        description: Cortical region near the rhinal sulcus in primate encompassing Brodmann's areas 35 and 36.
        meaning: UBERON:0025581
      perirhinal cortex of rodent of Burwell et al 1995:
        description: Cortical region surrounding the posterior rhinal sulcus in the rat, encompassing areas 35 and 36 in the rat. Rostraly, it abuts the posterior insular cortex.
        meaning: UBERON:0025584
      periventricular grey zone:
        description: UBERON region 'periventricular grey zone' (UBERON:2000516).
        meaning: UBERON:2000516
      pineal body:
        description: A midline, cone like structure located in the dorso-caudal roof of the 3rd ventricle, attached by peduncles to the habenular and posterior commissures. The stalk contains nerve fibers, blood vessels, connective tissue and parenchymal cells (Paxinos, The Rat Central Nervous System, 2nd ed, pg 399).
        meaning: UBERON:0001905
      pineal gland stalk:
        description: 'UBERON region ''pineal gland stalk'' (UBERON:0011768). Synonyms: habenula, epiphyseal stalk, pineal stalk.'
        meaning: UBERON:0011768
      piriform cortex:
        description: The subdivision of the laminated olfactory cortex with only three main layers that receive monosynaptic input from the olfactory bulb via the lateral olfactory tract; it is located bilaterally in the ventrolateral forebrain and is commonly divided into anterior and posterior regions.
        meaning: UBERON:0004725
      piriform-amygdalar area:
        description: In the human and macaque, the piriform-amygdalar area is not distinguished from the postpiriform transition area.
        meaning: UBERON:8440039
      pituitary stalk:
        description: The apical portion of the tubular structure extending from the hypothalamus to the posterior lobe of the pituitary gland.
        meaning: UBERON:0002434
      planum polare:
        description: A portion of the superior temporal gyrus near the temporal pole in the human.
        meaning: UBERON:0023861
      planum temporale:
        description: The planum temporale is the cortical area just posterior to the auditory cortex within the Sylvian fissure. It is a triangular region which forms the heart of Wernicke's area, one of the most important functional areas for language. The planum temporale shows a significant asymmetry. In 65% of all individuals the left planum temporale appears to be more developed, while the right planum temporale is more developed in only 10%. In some peoplebs brains, the planum temporale is more than five times larger on the left than on the right, making it the most asymmetrical structure in the brain. This greater size of the left planum temporale compared with the right is already present in the foetus, where it can be observed starting from the 31st week of gestation. This observation strengthens the hypothesis of a genetic predisposition for brain asymmetry.
        meaning: UBERON:0022268
      pole of cerebral hemisphere:
        description: The anterior end of the hemisphere is named the frontal pole. The posterior end is named the occipital pole. The anterior end of the temporal lobe, the temporal pole.
        meaning: UBERON:0009899
      pons:
        description: The part of the central nervous system lying between the medulla oblongata and the midbrain, ventral to the cerebellum.
        meaning: UBERON:0000988
      posterior cingulate cortex:
        description: Component of the cingulate cortex. The rostral and caudal extent were the caudal anterior and the isthmus divisions of the cingulate cortex respectively. The medial and lateral boundaries were the corpus callosum and as the superior frontal gyrus and/or paracentral lobule respectively (Christine Fennema-Notestine).
        meaning: UBERON:0022353
      posterior corona radiata:
        description: 'UBERON region ''posterior corona radiata'' (UBERON:0022427). Synonyms: cor-p, posterior portion of corona radiata.'
        meaning: UBERON:0022427
      posterior division of bed nuclei of stria terminalis:
        description: One of two divisions of the nuclei of stria terminalis based on topology, connectivity and multiple stains in the rat ( Swanson-2004 ) and the mouse ( Dong-2004 ). The other division consists of the anterior nuclei of stria terminalis. The posterior division includes the principal nucleus of stria terminalis, interfascicular nucleus of stria terminalis, transverse nucleus of stria terminalis, premedullary nucleus of stria terminalis, dorsal nucleus of stria terminalis, the strial extension of stria terminalis, and the cell sparse zone of stria terminalis.
        meaning: UBERON:0011177
      posterior hypothalamic region:
        description: The part of the hypothalamus posterior to the middle region consisting of several nuclei including the medial mamillary nucleus, lateral mamillary nucleus, and posterior hypothalamic nucleus (posterior hypothalamic area). The posterior hypothalamic area is concerned with control of sympathetic responses and is sensitive to conditions of decreasing temperature and controls the mechanisms for the conservation and increased production of heat.
        meaning: UBERON:0002770
      posterior lobe of cerebellum:
        description: The region of the cerebellum that is posterior to the primary fissure and anterior to the posteriolateral fissure.
        meaning: UBERON:0004002
      posterior median eminence:
        description: 'UBERON region ''posterior median eminence'' (UBERON:0002652). Synonyms: PME, eminentia mediana posterior.'
        meaning: UBERON:0002652
      posterior parietal association areas:
        description: 'UBERON region ''posterior parietal association areas'' (UBERON:0035886). Synonyms: PTLp.'
        meaning: UBERON:0035886
      posterior parietal caudal cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret that lies between the medial wall of the hemisphere and the medial lip of the suprasylvian sulcus and is posterior to PPr and anterior to area 18 (on the lateral gyrus) and area 21 (on the suprasylvian gyrus).
        meaning: UBERON:8440052
      posterior parietal cortex:
        description: The posterior parietal cortex is a portion of the parietal lobe which manipulates mental images, and integrates sensory and motor portions of the brain. Some sources say that it consists of Brodmann area 5 and Brodmann area 7. Other sources say it is only area 7.
        meaning: UBERON:0034889
      posterior parietal rostral cortical area (sensu Mustela putorius furo):
        description: A multimodal area of the ferret involved in vision and somatosensation that lies between the medial wall of the hemisphere and the medial lip of the suprasylvian sulcus and is posterior to caudal somatosensory cortex (SIII) and anterior to PPc.
        meaning: UBERON:8440050
      posterior segment of paracentral lobule:
        description: 'UBERON region ''posterior segment of paracentral lobule'' (UBERON:0035934). Synonyms: PCLp, posterior part of paracentral lobule.'
        meaning: UBERON:0035934
      posterior suprasylvian visual cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret that is lateral to the occipital visual areas (area 17, 18, 19 and 21), medial to perirhinal cortex and anterior to area 20b.
        meaning: UBERON:8440062
      posterior temporal fusiform gyrus:
        description: 'UBERON region ''posterior temporal fusiform gyrus'' (UBERON:0022397). Synonyms: occipitotemporal (fusiform) gyrus, posterior division.'
        meaning: UBERON:0022397
      posterior transverse temporal area 42:
        description: A subdivision of the cytoarchitecturally defined temporal region of cerebral cortex. It is located in the bank of the lateral sulcus on the dorsal surface of the temporal lobe. Cytoarchitecturally it is bounded medially by the anterior transverse temporal area 41(H) and laterally by the superior temporal area 22 (Brodmann-1909). Adapted from Brain Info.
        meaning: UBERON:0006096
      posterolateral lateral suprasylvian visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret located in the lateral bank of the suprasylvian sulcus posterior to ALLS, anteriomedial to DLS and lateral to PMLS.
        meaning: UBERON:8440059
      posterolateral visual area:
        description: 'UBERON region ''posterolateral visual area'' (UBERON:0035897). Synonyms: VISpl.'
        meaning: UBERON:0035897
      posterolateral visual area, layer 4:
        description: 'UBERON region ''posterolateral visual area, layer 4'' (UBERON:0035919). Synonyms: VISpl4.'
        meaning: UBERON:0035919
      posteromedial lateral suprasylvian visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret that is located in the posterior bank of the suprasylvian sulcus.
        meaning: UBERON:8440056
      posteromedial visual area:
        description: 'UBERON region ''posteromedial visual area'' (UBERON:0035900). Synonyms: VISpm.'
        meaning: UBERON:0035900
      posteromedial visual area, layer 4:
        description: 'UBERON region ''posteromedial visual area, layer 4'' (UBERON:0035914). Synonyms: VISpm4.'
        meaning: UBERON:0035914
      posteromedial visual area, layer 6a:
        description: 'UBERON region ''posteromedial visual area, layer 6a'' (UBERON:0035909). Synonyms: VISpm6a.'
        meaning: UBERON:0035909
      postrhinal area:
        description: 'UBERON region ''postrhinal area'' (UBERON:0035890). Synonyms: VISpor.'
        meaning: UBERON:0035890
      postrhinal area, layer 4:
        description: 'UBERON region ''postrhinal area, layer 4'' (UBERON:0035911). Synonyms: VISpor4.'
        meaning: UBERON:0035911
      postrhinal cortex of rodent of Burwell et al 1995:
        description: Cortical region lying caudal to the perirhinal cortex in the rat. It encompasses the caudal levels of area 35 and the caudal portion of area 36 (ectorhinal cortex). It is bordered medially by agranular retrosplenial cortex and ventrally by the entorhinal cortex (with the exception of the caudomedial portion). The authors note that the ventral portion of the postrhinal cortex in rat may by homologous with the parahippocampal cortex in the monkey.
        meaning: UBERON:0023928
      postsubiculum:
        description: Division of subicular cortex characterized by projections from the anterodorsal thalamic nucleus and to a lesser extent the anteroventral nucleus, bordered ventrally and laterally by the presubiculum and dorsally and medially by the retrosplenial granular a cortex.. The border is characterized by an abrupt change in the cyto- and chemoarchitecture.
        meaning: UBERON:0035971
      precentral operculum:
        description: The ventrolateral lip of the precentral gyrus, which overlies the insula and is bounded by the lateral fissure (Brain Info).
        meaning: UBERON:0002605
      prefrontal cortex:
        description: The anterior part of the frontal lobes of the brain, lying in front of the motor and premotor areas.nnThis brain region has been implicated in planning complex cognitive behaviors, personality expression, decision making and moderating correct social behavior. The basic activity of this brain region is considered to be orchestration of thoughts and actions in accordance with internal goals.nnThe most typical psychological term for functions carried out by the pre-frontal cortex area is executive function. Executive function relates to abilities to differentiate among conflicting thoughts, determine good and bad, better and best, same and different, future consequences of current activities, working toward a defined goal, prediction of outcomes, expectation based on actions, and social 'control' (the ability to suppress urges that, if not suppressed, could lead to socially-unacceptable outcomes).nnMany authors have indicated an integral link between a person's personality
          and the functions of the prefrontal cortex. - definition adapted from Wikipedia.
        meaning: UBERON:0000451
      prelimbic area:
        description: A region in the medial prefrontal cortex that is dorsal to the infralimbic area important in expression of conditioned reward and fear behaviour.
        meaning: UBERON:8440032
      premotor cortex:
        description: The premotor cortex is an area of motor cortex lying within the frontal lobe of the brain. It extends 3 mm anterior to the primary motor cortex, near the Sylvian fissure, before narrowing to approximately 1 mm near the medial longitudinal fissure, which serves as the posterior border for the prefrontal cortex. The premotor cortex is largely equivalent to Brodmann area 6. Activity within this region is critical to the sensory guidance of movement and control of proximal and trunk muscles of the body.
        meaning: UBERON:0016634
      preoptic area:
        description: Area of the forebrain between the anterior commissure and optic chiasm.
        meaning: UBERON:0001928
      prepyriform area:
        description: Prepyriform area (or prepiriform cortex) is a portion of the rhinencephalon consisting of paleocortex. Some sources state that it is part of the primary olfactory cortex.
        meaning: UBERON:0002590
      Press, Brewer, Dougherty, Wade and Wandell (2001) visuotopic area V7:
        description: 'UBERON region ''Press, Brewer, Dougherty, Wade and Wandell (2001) visuotopic area V7'' (UBERON:0026776). Synonyms: press, brewer, dougherty, wade and wandell (2001) visuotopic area v7.'
        meaning: UBERON:0026776
      primary auditory cortex:
        description: The part of the auditory cortex that is located on the superior temporal gyrus in the temporal lobe and receives point-to-point input from the ventral division of the medial geniculate complex.
        meaning: UBERON:0034751
      primary motor cortex:
        description: The part of the cerebral cortex that receives projections from the motor thalamus and which projects to motor neurons in the brainstem and spinal cord. The motor cortex corresponds to Brodmann's area 4 (MM). The primary motor cortex, or M1, is located on the precentral gyrus and on the anterior paracentral lobule on the medial surface of the brain. Of the three motor cortex areas, stimulation of the primary motor cortex requires the least amount of electrical current to elicit a movement. http://neuroscience.uth.tmc.edu/s3/chapter03.html.
        meaning: UBERON:0001384
      primary olfactory cortex:
        description: A group of structures defined by connectivity, namely, structures that receive axons from the olfactory bulb. They include the anterior olfactory nucleus, the anterior perforated substance, the rostral part of the medial amygdaloid nucleus (anterior cortical nucleus of amygdala), and structures in the anterior part of the parahippocampal gyrus, namely, the prepyriform area, most of the periamygdaloid area, and the rostral part of the entorhinal area (Price-90). Note that some authors have regarded the olfactory bulb itself as the primary olfactory area and the areas to which it projects as secondary (Anthoney-94). In the mouse (Dong-2004) and the rat (Swanson-2004), olfactory areas include the olfactory bulb, accessory olfactory bulb, anterior olfactory nucleus, tenia tecta, prepyriform area, postpiriform transition area, piriform amygdaloid area, nucleus of lateral olfactory tract, and cortical amygdaloid area.
        meaning: UBERON:0022469
      primary somatosensory cortex:
        description: '(Chapin & Lin, 1984, rat): the region considered as the SI cortex is not a cytoarchitecturally homogeneous structure but consists instead of a patchwork array of areas containing dense aggregations of layer IV granule cells, surrounded by granule-cell-sparse regions. As was shown by Welker (b71,b76), and in our own mapping studies (see Fig. 3), this discontinuous pattern of granular, or koniocortical, zones contains within itself a map of the ratbs cutaneous periphery. There are clear subtypes within this cytoarchitectural subregion, notably including the bgranular aggregateb type of cytoarchitecture characteristic of the paw, limb, and mystacial vibrissae areas, and the bbarrel-fieldb type (originally described by Woolsey and Van der Loos, b70) seen in the nose and perioral regions. In the mouse, but not the rat, such barrels also cover the whole whisker representation (Welker and Woolsey, b74).'
        meaning: UBERON:0008933
      primary visual area, layer 2/3:
        description: 'UBERON region ''primary visual area, layer 2/3'' (UBERON:0035907). Synonyms: VISp2/3.'
        meaning: UBERON:0035907
      primary visual area, layer 4:
        description: 'UBERON region ''primary visual area, layer 4'' (UBERON:0035904). Synonyms: VISp4.'
        meaning: UBERON:0035904
      primary visual area, layer 5:
        description: 'UBERON region ''primary visual area, layer 5'' (UBERON:0035906). Synonyms: VISp5.'
        meaning: UBERON:0035906
      primary visual area, layer 6a:
        description: 'UBERON region ''primary visual area, layer 6a'' (UBERON:0035892). Synonyms: VISp6a.'
        meaning: UBERON:0035892
      primary visual cortex:
        description: In some species, parcellations of lobes are not well defined if at all. The primary visual cortex being part of the occiptal lobe hence could refer to it being part of the most posterior region of the mammalian cerebral cortex.
        meaning: UBERON:0002436
      principal anterior division of supraoptic nucleus:
        description: One of two divisions of the supraoptic nucleus observed in mammals, formed by the ascension of the optic chiasm to split the nucleus in two. The principal anterior division consists of a dense cluster of large cells that stain darkly in Nissl preparations adjacent to the optic chiasm, extending as far rostrally to the organum vasculosum of the lamina terminalis and caudally into the posterior hypothalamus.
        meaning: UBERON:0024078
      proisocortex:
        description: The part of the neocortex hich mainly consists of parts of cingulate, parahippocampal and temporopolar cortice. As distinct from isocortex (typical neocortex) which contains other regions.
        meaning: UBERON:0014951
      pyloric dilator nerve (sensu Cancer borealis):
        description: Innervates muscles that dilate valves of the pylorus motor neurons involved in filtering in crustaceans. Anterior burster neurons are intrinsic oscillators that are electrically coupled with pyloric dilator neurons, causing them to fire bursts of action potentials. Together these neurons inhibit lateral pyloric and pyloric neurons, forcing them to fire in alternation with the pyloric dilator neurons.
        meaning: UBERON:8910016
      pyloric nerve (sensu Cancer borealis):
        description: Innervates pyloric region of the stomach.
        meaning: UBERON:8910015
      pyramid of medulla oblongata:
        description: The anterior or ventral portion of the medulla oblongata is named the pyramid and lies between the anterior median fissure and the antero-lateral sulcus. Its upper end is slightly constricted, and between it and the pons the fibers of the abducent nerve emerge; a little below the pons it becomes enlarged and prominent, and finally tapers into the anterior funiculus of the medulla spinalis, with which, at first sight, it appears to be directly continuous[WP].
        meaning: UBERON:0005159
      quadrangular lobule:
        description: UBERON region 'quadrangular lobule' (UBERON:0036063).
        meaning: UBERON:0036063
      raphe nuclei:
        description: we treat NR obscurus, NR magnus etc as parts of the raphe nuclei. This is consistent with treatment in FMA, where the class is 'set of raphe nuclei'
        meaning: UBERON:0004684
      regional part of brain:
        description: Anatomical divisons of the brain according to one or more criteria, e.g. cytoarchitectural, gross anatomy. Parts may be contiguous in 3D or not, e.g., basal ganglia.
        meaning: UBERON:0002616
      regional part of cerebellar cortex:
        description: A regional part of brain that is part of a cerebellar cortex [Automatically generated definition].
        meaning: UBERON:0002749
      reticular formation:
        description: A composite substructure of the brainstem that consists of the midbrain reticular formation, the pontine reticular formation and the medullary reticular formation ( Carpenter-1983 ).
        meaning: UBERON:0002275
      retrohippocampal region:
        description: 'UBERON region ''retrohippocampal region'' (UBERON:0022230). Synonyms: retrohippocampal cortex.'
        meaning: UBERON:0022230
      retrolenticular part of internal capsule:
        description: 'UBERON region ''retrolenticular part of internal capsule'' (UBERON:0034749). Synonyms: pars retrolenticularis capsulae internae, pars retrolentiformis (capsulae internae), pars retrolentiformis.'
        meaning: UBERON:0034749
      retrorubral area of midbrain reticular nucleus:
        description: The term retrorubral area of the midbrain reticular nucleus refers to a region of the rat brain caudal and dorsal to the ventral tegmental area. It is one of three parts of the midbrain reticular nucleus; the other two are the magnocellular part of the midbrain reticular nucleus and the parvicellular part of the midbrain reticular nucleus (Swanson-2004). BrainInfo distinguishes between the Retrorubral area of the midbrain reticular formation and the retrorubral nucleus.
        meaning: UBERON:0011172
      retrosplenial granular cortex:
        description: 'UBERON region ''retrosplenial granular cortex'' (UBERON:0014918). Synonyms: retrosplenial area, ventral part, retrosplenial cortex, ventral part, retrosplenial granular area.'
        meaning: UBERON:0014918
      retrosplenial region:
        description: The retrosplenial region is a brain area and part of the cingulate cortex. It is defined by Brodmann area 26, Brodmann area 29 and the Brodmann area 30.
        meaning: UBERON:0013531
      right auditory cortex:
        description: An auditory cortex that is in the left side of a brain.
        meaning: UBERON:0009897
      right dorsal thalamus:
        description: A dorsal thalamus that is in_the_right_side_of a diencephalon.
        meaning: UBERON:0013684
      right hemisphere of cerebellum:
        description: A cerebellar hemisphere that is in_the_right_side_of a cerebellum.
        meaning: UBERON:0014890
      rostral anterior cingulate cortex:
        description: Component of the cingulate cortex. The rostral boundary was the first appearance of the cingulate sulcus (inferior to the superior frontal sulcus) whereas the caudal boundary was the first appearance of the genu of the corpus callosum. The medial boundary was the medial aspect of the cortex. The supero-lateral boundary was the superior frontal gyrus whereas the infero-lateral boundary was defined as the medial division of the orbitofrontal gyrus (Christine Fennema-Notestine).
        meaning: UBERON:0022438
      rostral CA1:
        description: 'UBERON region ''rostral CA1'' (UBERON:0034777). Synonyms: CA1R.'
        meaning: UBERON:0034777
      rostral CA2:
        description: 'UBERON region ''rostral CA2'' (UBERON:0034778). Synonyms: CA2R.'
        meaning: UBERON:0034778
      rostral CA3:
        description: 'UBERON region ''rostral CA3'' (UBERON:0034779). Synonyms: CA3R.'
        meaning: UBERON:0034779
      rostral middle frontal gyrus:
        description: Component of the middle frontal gyrus The rostral boundary is the first appearance of the superior frontal sulcus whereas the caudal boundary is the middle frontal gyrus. The medial and lateral boundaries are the superior frontal sulcus and the inferior frontal sulcus respectively (Christine Fennema-Notestine).
        meaning: UBERON:0006446
      rostral migratory stream:
        description: Unique telencephalic subventricular zones that extend from the lateral ventricles into the olfactory bulbs. Newly produced GABAergic interneurons migrate along the RMS and settle in the bulb.
        meaning: UBERON:0008881
      rostral periventricular region of the third ventricle:
        description: A functional anatomical construct containing the key estrogen-regulated inputs to gonadotropin-releasing hormone expressing (GnRH) neurons necessary for estrogen positive feedback. The rostral periventricular region of the third ventricle contains a population of neurons, scattered through the nuclei of the anteroventral periventricular (AVPV), periventricular preoptic (PVpo), and median preoptic (MEPO), that project directly to GnRH neurons and express ER-alpha.
        meaning: UBERON:8440005
      rostral portion of the medial accessory olive:
        description: 'UBERON region ''rostral portion of the medial accessory olive'' (UBERON:0024043). Synonyms: rostral portion of the medial accessory olive.'
        meaning: UBERON:0024043
      rostral ventrolateral medulla:
        description: Control of blood pressure is crucially dependent on the integrity of a small region of the brainstem called the ventrolateral medulla. Within this part of the brain are the cells that control the heart, blood vessels, swallowing, breathing and many other functions of the body that are not noticed at a conscious level; such unconscious activities are known as 'Autonomic'. One of these regions is the Rostral Ventrolateral Medulla (RVLM) is also known as the pressor area of the medulla (medulla pressor). It receives inhibitory GABAergic input from the caudal ventrolateral medulla (CVLM). The RVLM is the primary regulator of the sympathetic nervous system, sending excitatory fibers (catecholaminergic) to the sympathetic preganglionic neurons in the spinal cord, via reticulospinal tract[WP].
        meaning: UBERON:0005807
      rostrolateral area, layer 5:
        description: 'UBERON region ''rostrolateral area, layer 5'' (UBERON:0035920). Synonyms: VISrl5.'
        meaning: UBERON:0035920
      rostrolateral visual area:
        description: 'UBERON region ''rostrolateral visual area'' (UBERON:0035912). Synonyms: VISrl.'
        meaning: UBERON:0035912
      saccus vasculosus:
        description: A circumventricular organ of the hypothalamus of many jawed fishes, protruding from the caudal infundibular wall. It is a vascularized neuroepithelium that consists of coronet cells, cerebrospinal fluid-contacting neurons and supporting cells.
        meaning: UBERON:0034943
      second visual cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret that is rostral to area 17, caudal to area 19 and also abuts PPc and area 20a.
        meaning: UBERON:8440045
      secondary auditory cortex:
        description: The part of the auditory cortex that receive more diffuse input from the belt areas of the medial geniculate complex.
        meaning: UBERON:0034752
      secondary olfactory cortex:
        description: Brodmann's area 28; major gateway for neocortical input to the hippocampus; origin of the perforant pathway; a component of the medial temporal lobe memory system. (CSP) * The cytoarchitecturally well-defined area of multilaminate cerebral cortex on the medial aspect of the parahippocampal gyrus, immediately caudal to the olfactory cortex of the uncus. The entorhinal cortex is the origin of the major neural fiber system afferent to the hippocampus, the so-called PERFORANT PATHWAY. (Stedman, 25th ed).
        meaning: UBERON:0002895
      secondary prosencephalon:
        description: may contain the optic recess region (ORR) in the new model proposed by Yamamoto et al. 2017 (see https://www.ncbi.nlm.nih.gov/pubmed/28470718)
        meaning: UBERON:0036218
      secondary somatosensory cortex:
        description: The area of the upper bank of the lateral sulcus that is involved in somatic sensation.
        meaning: UBERON:0008934
      secondary visual cortex:
        description: A functional part of the visual cortex that plays a crucial role in the integration of information from various visual modalities and contribute to higher-order visual functions, including colour, object recognition and spatial awareness.
        meaning: UBERON:0022232
      secretory circumventricular organ:
        description: A circumventricular organ that is capable of secreting substances into the cerebrospinal fluid.
        meaning: UBERON:0010134
      sensory circumventricular organ:
        description: A circumventricular organ that is capable of monitoring the levels of substances to the cerebrospinal fluid.
        meaning: UBERON:0010135
      shell of nucleus accumbens:
        description: Crescent shaped outer zone of the nucleus accumbens, defined by a combination of chemoarchitecture and afferent and efferent connections. The shell is distinguished from the more centrally located core through the notable reduction in staining for the calcium-binding protein calbindin D28K, which is dense in the core and virtually absent in the shell.
        meaning: UBERON:0012171
      somatomotor area:
        description: A part of the cerebral cortex that comprises of the primary motor cortex and the premotor cortex.
        meaning: UBERON:8440076
      somatosensory cortex:
        description: Area of the parietal lobe concerned with receiving general sensations. It lies posterior to the central sulcus.
        meaning: UBERON:0008930
      Sommer's sector:
        description: Part of hippocampal formation comprising area CA1 and the subiculum (pg 425, Heimer, L. The human brain and spinal cord, Springer-Verlag, 1995).
        meaning: UBERON:0023932
      spenial visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret located on the dorsal bank of the splenial sulcus between the medial border of area 17 and the lateral borter of CVA.
        meaning: UBERON:8440064
      spinocerebellum:
        description: A phylogenetic subdivision of the cerebellum, the intermediate part, which regulates body and limb movements. It receives proprioception input from the dorsal columns of the spinal cord (including the spinocerebellar tract) and the trigeminal nerve, as well as from visual and auditory systems. It sends fibres to deep cerebellar nuclei which in turn project to both the cerebral cortex and the brain stem, thus providing modulation of descending motor systems.
        meaning: UBERON:0014643
      stomatogastric nerve (sensu Cancer borealis):
        description: The stomatogastric nerve (SGN) is made up of four separate nerves that emerge from the paired commissural ganglia, the superior and inferior esophageal nerves (SONs and IONs).
        meaning: UBERON:8910010
      striosomal part of body of caudate nucleus:
        description: 'UBERON region ''striosomal part of body of caudate nucleus'' (UBERON:0027244). Synonyms: striosomal part of body of caudate nucleus.'
        meaning: UBERON:0027244
      striosomal part of caudate nucleus:
        description: 'UBERON region ''striosomal part of caudate nucleus'' (UBERON:0029004). Synonyms: striosomal part of caudate nucleus.'
        meaning: UBERON:0029004
      striosomal part of putamen:
        description: 'UBERON region ''striosomal part of putamen'' (UBERON:0029005). Synonyms: striosomal part of putamen.'
        meaning: UBERON:0029005
      striosome:
        description: One of two compartments identified in the neostriatum, particularly the caudate nucleus, on the basis of differential staining for several biochemical markers such as acetylcholinesterase and calbindin. In individual sections, the striosomes appear as small patches of differentially high or low staining activity. In three dimensions, they form a 3D labyrinth extending throughout the caudate nucleus and in the putamen.
        meaning: UBERON:0027371
      subcommissural organ:
        description: Occurs throughout the vertebartes [PMID:9579598, DOI:10.1002/ar.1091260210]. First appears in hagfish(Olsson). In many species, including the human, it reaches its full development during embryonic life[PMID:9579598]. During the course of phyletic evolution, one notes various changes. Indeed, in lower vertebrates, the SCO presents a greater degree of enzyme activity than the ependyma while in birds the ependyma demonstrates a more intense activity than the SCO[PMID:479574] Sometimes preceded by flexural organ[DOI:10.1007/BF00303086]. Hypendymal cells are rare in non-mammals [PMID:9579598].
        meaning: UBERON:0002139
      subdivision of diagonal band:
        description: 'UBERON region ''subdivision of diagonal band'' (UBERON:0006125). Synonyms: diagonal band subdivision, regional part of diagonal band.'
        meaning: UBERON:0006125
      subfornical organ:
        description: Group of neurons situated on the ventral surface of the fornix at the level of the foramen of Monro in the third ventricle (adapted from Wikipedia via NIF).
        meaning: UBERON:0002219
      subicular complex:
        description: A composite structure of the temporal lobe that includes the subiculum, the presubiculum and the parasubicular area (Amaral-90).
        meaning: UBERON:0023787
      subiculum:
        description: Part of the hippocampal formation that is bounded by the entorhinal cortex and area CA1. It is characterized on the CA1 border by an abrupt widening of the pyramidal cell layer. A molecular layer is present that is continuous with that of CA1, although the stratum radiatum is no longer present. The stratum oriens is also not present. adapted from Paxinos, G. The rat central nervous system, 2nd ed, Academic Press, San Diego, 1995, pg. 468).
        meaning: UBERON:0002191
      subparaventricular zone:
        description: UBERON region 'subparaventricular zone' (UBERON:0007626).
        meaning: UBERON:0007626
      substantia nigra pars lateralis:
        description: 'UBERON region ''substantia nigra pars lateralis'' (UBERON:0002995). Synonyms: internal capsule (Burdach), lateral part of substantia nigra, pars lateralis substantiae nigrae.'
        meaning: UBERON:0002995
      superficial feature part of forebrain:
        description: 'UBERON region ''superficial feature part of forebrain'' (UBERON:0023443). Synonyms: superficial feature part of forebrain.'
        meaning: UBERON:0023443
      superficial feature part of occipital lobe:
        description: 'UBERON region ''superficial feature part of occipital lobe'' (UBERON:0023462). Synonyms: superficial feature part of occipital lobe.'
        meaning: UBERON:0023462
      superficial feature part of the cerebellum:
        description: 'UBERON region ''superficial feature part of the cerebellum'' (UBERON:0024046). Synonyms: superficial feature part of the cerebellum.'
        meaning: UBERON:0024046
      superficial pretectum:
        description: UBERON region 'superficial pretectum' (UBERON:2000687).
        meaning: UBERON:2000687
      superior cerebellar peduncle of midbrain:
        description: Regional part of superior cerebellar peduncle, located in the midbrain, consisting of a large bundle of fibers largely projecting from the deep cerebellar nuclei to the midbrain and thalamus. It is continuous with the superior cerebellar peduncle of the pons. (MM).
        meaning: UBERON:0007707
      superior cerebellar peduncle of pons:
        description: 'UBERON region ''superior cerebellar peduncle of pons'' (UBERON:0007709). Synonyms: SCPP, SCPP, pedunculus cerebellaris superior (pontis).'
        meaning: UBERON:0007709
      superior colliculus:
        description: ). In hagfish, lamprey, and shark it is a relatively small structure, but in teleost fish it is greatly expanded, in some cases becoming the largest structure in the brain. (See the adjoining drawing of a codfish brain.) In amphibians, reptiles, and especially birds it is also a very significant component, but in mammals it is dwarfed by the massive expansion of the cerebral cortex.
        meaning: UBERON:0001945
      superior corona radiata:
        description: 'UBERON region ''superior corona radiata'' (UBERON:0022426). Synonyms: cor-s, superior portion of corona radiata.'
        meaning: UBERON:0022426
      superior esophageal nerve (sensu Cancer borealis):
        description: The superior esophageal nerve (SON) is one of the four nerves that make up the stomatogastric nerve (SGN).
        meaning: UBERON:8910018
      superior lateral occipital cortex:
        description: 'UBERON region ''superior lateral occipital cortex'' (UBERON:0022368). Synonyms: lateral occipital cortex, superior division.'
        meaning: UBERON:0022368
      superior rostral gyrus:
        description: 'UBERON region ''superior rostral gyrus'' (UBERON:0019279). Synonyms: superior rostral gyrus.'
        meaning: UBERON:0019279
      superior transverse frontopolar gyrus:
        description: 'UBERON region ''superior transverse frontopolar gyrus'' (UBERON:0024201). Synonyms: superior transverse frontopolar gyrus.'
        meaning: UBERON:0024201
      supplemental motor cortex:
        description: The supplementary motor area (SMA) is a part of the sensorimotor cerebral cortex (perirolandic, i.e. on each side of the Rolando or central sulcus). It was included, on purely cytoarchitectonic arguments, in area 6 of Brodmann and the Vogts. It is located on the medial face of the hemisphere, just in front of primary motor cortex. This is an element that appeared late in evolution, in monkeys, linked to the appearance of a true medial pallidum.
        meaning: UBERON:0016636
      suprachiasmatic nucleus dorsomedial part:
        description: 'UBERON region ''suprachiasmatic nucleus dorsomedial part'' (UBERON:0027768). Synonyms: suprachiasmatic nucleus dorsomedial part.'
        meaning: UBERON:0027768
      suprachiasmatic nucleus ventrolateral part:
        description: 'UBERON region ''suprachiasmatic nucleus ventrolateral part'' (UBERON:0027771). Synonyms: suprachiasmatic nucleus ventrolateral part.'
        meaning: UBERON:0027771
      supraoptic crest:
        description: One of the circumventricular organs of the brain. The OVLT is outside the blood brain barrier, and so neurons in this region can respond to factors that are present in the systemic circulation.
        meaning: UBERON:0002689
      synencephalon:
        description: UBERON region 'synencephalon' (UBERON:2000293).
        meaning: UBERON:2000293
      telencephalic dopaminergic cell group:
        description: 'UBERON region ''telencephalic dopaminergic cell group'' (UBERON:0036011). Synonyms: telencephalic DA cell group, telencephalic DA neurons, telencephalic dopamine cells.'
        meaning: UBERON:0036011
      telencephalon:
        description: Part of the forebrain consisting of paired olfactory bulbs and cerebral hemispheres.
        meaning: UBERON:0001893
      temporal cortex association area:
        description: 'UBERON region ''temporal cortex association area'' (UBERON:0035013). Synonyms: temporal association area, temporal association areas, temporal association cortex.'
        meaning: UBERON:0035013
      temporal fusiform gyrus:
        description: 'UBERON region ''temporal fusiform gyrus'' (UBERON:0022395). Synonyms: FuGt, occipitotemporal (fusiform) gyrus, temporal part.'
        meaning: UBERON:0022395
      temporal operculum:
        description: Part of temporal lobe overlaying the insular cortex.
        meaning: UBERON:0002560
      temporal pole:
        description: Anterior component of the temporal lobe (rostral boundary) extends caudally to the entorhinal cortex. The medial and lateral boundaries are the medial aspect of the temporal lobe and the superior or inferior temporal sulci, respectively (Christine Fennema-Notestine).
        meaning: UBERON:0002576
      temporal visual area a (sensu Mustela putorius furo):
        description: A visual area in the ferret that is posterior to area 20b and lies lateral to areas 17, 18, and 19.
        meaning: UBERON:8440048
      temporal visual area b (sensu Mustela putorius furo):
        description: A visual area in the ferret that is posterior to area PS and anterior to 20a.
        meaning: UBERON:8440049
      temporoparietal junction:
        description: An area of the brain that locates at the interception of temporal and parietal cortices (at the posterior end of the Sylvian fissure).
        meaning: UBERON:0023852
      thalamic eminence:
        description: 'UBERON region ''thalamic eminence'' (UBERON:0014912). Synonyms: EMT, eminentia thalami.'
        meaning: UBERON:0014912
      third visual cortical area (sensu Mustela putorius furo):
        description: A visual area in the ferret located rostral to area 18 and caudal to area 21.
        meaning: UBERON:8440046
      Tootell and Hadjikhani (2001) LOC/LOP complex:
        description: Cortical parcel in occipital cortex of human according to Tootell and Hadjikhani 2001 that is activated preferentially by more peripheral stimuli compared to the adjacent lateral occipital central parcel.
        meaning: UBERON:0026775
      torus longitudinalis:
        description: UBERON region 'torus longitudinalis' (UBERON:2000449).
        meaning: UBERON:2000449
      torus semicircularis:
        description: UBERON region 'torus semicircularis' (UBERON:2000599).
        meaning: UBERON:2000599
      transverse frontopolar gyri complex:
        description: 'UBERON region ''transverse frontopolar gyri complex'' (UBERON:0022730). Synonyms: transverse frontopolar gyri complex, transverse frontopolar gyri.'
        meaning: UBERON:0022730
      tuber cinereum:
        description: Part of hypothalamus consisting of hollow eminence of gray matter situated between the mammilary bodies and the optic chiasm visible on the basal surface of the brain (adapted from Wikipedia).
        meaning: UBERON:0002620
      tuberomammillary nucleus dorsal part:
        description: 'UBERON region ''tuberomammillary nucleus dorsal part'' (UBERON:0014593). Synonyms: TMd, tuberomammillary nucleus dorsal part, tuberomammillary nucleus, dorsal part.'
        meaning: UBERON:0014593
      tuberomammillary nucleus ventral part:
        description: 'UBERON region ''tuberomammillary nucleus ventral part'' (UBERON:0014594). Synonyms: TMv, tuberomammillary nucleus ventral part.'
        meaning: UBERON:0014594
      uncal CA1:
        description: 'UBERON region ''uncal CA1'' (UBERON:0034774). Synonyms: CA1U.'
        meaning: UBERON:0034774
      uncal CA2:
        description: 'UBERON region ''uncal CA2'' (UBERON:0034775). Synonyms: CA2U.'
        meaning: UBERON:0034775
      uncal CA3:
        description: 'UBERON region ''uncal CA3'' (UBERON:0034776). Synonyms: CA3U.'
        meaning: UBERON:0034776
      uncinate fasciculus of the forebrain:
        description: A fiber pathway in the cerebral white matter that connects anterior portions of the temporal lobe with the inferior frontal gyrus and the middle frontal gyrus. It is not readily distinguished in myelin-stained cross-sections (adapted from Brain Info).
        meaning: UBERON:0019275
      uncus of parahippocampal gyrus:
        description: The anterior extremity of the Parahippocampal gyrus is recurved in the form of a hook, the uncus, which is separated from the apex of the temporal lobe by a slight fissure, the incisura temporalis. Although superficially continuous with the hippocampal gyrus, the uncus forms morphologically a part of the rhinencephalon. The term uncus was coined by Felix Vicq dbAzyr (1748b1794).
        meaning: UBERON:0034773
      upper rhombic lip:
        description: Anterior-most region of dorsal hindbrain within rhombomere 1, adjacent the midbrain-hindbrain boundary.
        meaning: UBERON:0009841
      valvula cerebelli:
        description: Brain structure which is caudally attached to the rostral medulla oblongata and extends into the tectal ventricle. The valvula cerebelli consists of a granular and a molecular layer along with aggregations of large Purkinje and eurydendroid cells and is uniquely present in ray-finned fishes. From Neuroanatomy of the Zebrafish Brain.
        meaning: UBERON:2000603
      ventral lateral suprasylvian visual area (sensu Mustela putorius furo):
        description: A visual area in the ferret located in the medial bank of the suprasylvian sulvus lateral to area PMLS.
        meaning: UBERON:8440061
      ventral pallium:
        description: The pallial region located next to the pallium-subpallium boundary.
        meaning: UBERON:0014913
      ventral part of telencephalon:
        description: Ventral part (base region) of the telencephalon.
        meaning: UBERON:0000204
      ventral tegmental area:
        description: Unpaired midbrain region situated in the ventromedial portion of the reticular formation. The VTA is medial to the substantia nigra and ventral to the red nucleus, and extends caudally from the posterior hypothalamus in the diencephalon. The VTA contains dopamine neurons that project to various limbic and cortical areas and is a critical component of the brain's reward circuitry.
        meaning: UBERON:0002691
      ventral thalamus:
        description: Some sources treat the subthalamus as distinct from the thalamus, separated by the zona limitans intrathalamica. In MA, the ventral thalamus is part of the thalamus. Butler Hodos who identify a dorsal to ventral sequence consisting of epithalamus, dorsal thalamus, ventral thalamus and hypothalamus. We solve this by considering dorsal and ventral thalamus distinct, and the label thalamus as being ambiguous w.r.t thalamus proper (dorsal thalamus) or wider thalamus (dorsal plus ventral)
        meaning: UBERON:0001900
      ventral zone:
        description: UBERON region 'ventral zone' (UBERON:2000707).
        meaning: UBERON:2000707
      ventral zone of medial entorhinal cortex:
        description: 'UBERON region ''ventral zone of medial entorhinal cortex'' (UBERON:0018263). Synonyms: entorhinal area, medial part, ventral zone [Haug], entorhinal area, medial part, ventral zone, entorhinal area, medial part, ventral zone.'
        meaning: UBERON:0018263
      ventro-caudal cluster:
        description: Early-forming neural cluster of the ventral midbrain. At 16 h, axons of the vcc grow caudally to pioneer the medial longitudinal fasciculus (MLF), which is part of the larger ventral longitudinal tract (VLT). Later, neurons from this cluster project axons rostrally into the tract of the post-optic commissure (TPOC). Ross et al., 1992.
        meaning: UBERON:2007003
      vermis of the flocculonodular lobe of the cerebellum:
        description: 'UBERON region ''vermis of the flocculonodular lobe of the cerebellum'' (UBERON:0024037). Synonyms: flocculonodular vermis, vermis of the flocculonodular lobe of the cerebellum.'
        meaning: UBERON:0024037
      vertical limb of the diagonal band:
        description: 'UBERON region ''vertical limb of the diagonal band'' (UBERON:0006124). Synonyms: crus verticale striae diagonalis, nucleus of the vertical limb of the diagonal band, vertical limb of diagonal band.'
        meaning: UBERON:0006124
      vestibulocerebellum:
        description: A phylogenetic subdivision of the cerebellum, the oldest part, which regulates balance and eye movements. It receives vestibular input from both the semicircular canals and from the vestibular nuclei, and sends fibres back to the medial and lateral vestibular nuclei. It also receives visual input from the superior colliculi and from the visual cortex (the latter via the pontine nuclei, forming a cortico-ponto-cerebellar pathway). Lesions of the vestibulocerebellum cause disturbances of balance and gait.
        meaning: UBERON:0014642
      vestibulolateralis lobe:
        description: UBERON region 'vestibulolateralis lobe' (UBERON:2000307).
        meaning: UBERON:2000307
      visceral area:
        description: A cortical area between the agranular insular cortex and the supplemental somatosensory area in rats and mice. The VISC is the architectonically equivalent structure granular insula in humans.
        meaning: UBERON:8440024
      visual association cortex:
        description: Part of cortex considered to function in higher level visual functions.
        meaning: UBERON:0034750
      visual cortex:
        description: The visual cortex is made up of Brodmann area 17 (the primary visual cortex), and Brodmann area 18 and Brodmann area 19, the extrastriate cortical areas, in humans.
        meaning: UBERON:0000411
